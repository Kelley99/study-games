<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);min-height:100vh;color:#333}
.container{max-width:800px;margin:0 auto;padding:20px}
.header{text-align:center;color:#fff;margin-bottom:20px}
.header h1{font-size:28px;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,0.3)}
.stats{display:flex;justify-content:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.stat-box{background:rgba(255,255,255,0.95);padding:15px 25px;border-radius:15px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.2);min-width:100px}
.stat-box .value{font-size:24px;font-weight:bold;color:#11998e}
.stat-box .label{font-size:12px;color:#666;margin-top:5px}
.screen{display:none;background:rgba(255,255,255,0.98);border-radius:20px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.screen.active{display:block}
.btn{background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);color:#fff;border:none;padding:12px 25px;border-radius:25px;cursor:pointer;font-size:16px;transition:transform 0.2s,box-shadow 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(17,153,142,0.4)}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.chapter-list{display:grid;gap:15px}
.chapter{background:#f8f9fa;border-radius:15px;padding:20px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:2px solid transparent}
.chapter:hover{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,0.1)}
.chapter.current{border-color:#11998e;background:#f0fff4}
.chapter.locked{opacity:0.6;cursor:not-allowed}
.chapter.done{border-color:#28a745;background:#f0fff4}
.chapter-title{font-size:18px;font-weight:bold;color:#333;margin-bottom:8px}
.chapter-desc{font-size:14px;color:#666}
.chapter-tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;margin-top:10px}
.tag-current{background:#11998e;color:#fff}
.tag-locked{background:#6c757d;color:#fff}
.tag-done{background:#28a745;color:#fff}
.stage-list{display:grid;gap:12px;margin-top:20px}
.stage{background:#f8f9fa;border-radius:12px;padding:15px;cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center}
.stage:hover{background:#e9ecef}
.stage-name{font-weight:bold;color:#333}
.stage-stars{color:#ffc107;font-size:18px}
.quiz-container{text-align:center}
.progress{margin-bottom:20px}
.progress-bar{height:8px;background:#e9ecef;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#11998e,#38ef7d);transition:width 0.3s}
.progress-text{font-size:14px;color:#666;margin-top:8px}
.question{font-size:20px;font-weight:bold;color:#333;margin-bottom:25px;line-height:1.6}
.options{display:grid;gap:12px;max-width:500px;margin:0 auto}
.option{background:#f8f9fa;border:2px solid #e9ecef;border-radius:12px;padding:15px;cursor:pointer;transition:all 0.2s;text-align:left}
.option:hover{border-color:#11998e;background:#f0fff4}
.option.correct{border-color:#28a745;background:#d4edda}
.option.wrong{border-color:#dc3545;background:#f8d7da}
.option.disabled{pointer-events:none;opacity:0.7}
.hint{background:#d1ecf1;border:1px solid #bee5eb;border-radius:10px;padding:15px;margin-top:20px;color:#0c5460;display:none}
.hint.show{display:block}
.result{text-align:center;padding:40px 20px}
.result-icon{font-size:80px;margin-bottom:20px}
.result-title{font-size:28px;font-weight:bold;color:#333;margin-bottom:15px}
.result-stats{display:flex;justify-content:center;gap:30px;margin:25px 0}
.result-stat{text-align:center}
.result-stat .num{font-size:36px;font-weight:bold;color:#11998e}
.result-stat .txt{font-size:14px;color:#666}
.reward{background:linear-gradient(135deg,#38ef7d 0%,#11998e 100%);color:#fff;padding:20px;border-radius:15px;margin:20px 0;font-size:18px;font-weight:bold}
.btn-group{display:flex;gap:15px;justify-content:center;margin-top:25px;flex-wrap:wrap}
.difficulty{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;margin-left:10px}
.diff-easy{background:#d4edda;color:#155724}
.diff-med{background:#fff3cd;color:#856404}
.diff-hard{background:#f8d7da;color:#721c24}
.unlock-hint{text-align:center;color:#fff;font-size:14px;margin-top:10px;opacity:0.9}
</style>
</head>

<script>

var LVT = ["生物新手","生物学徒","生物勇士","生物精英","生物骑士","生物达人","生物高手","生物专家","生物大师","生物宗师","生物王者","生物霸主","生物传说","生物至尊","生物天尊","生物圣人","生物贤者","生物神者","生物创世","生物之神"];
function defS(){return{coins:0,xp:0,lv:1,streak:0,lastDay:null,stars:{},c2unlocked:false}}
function loadS(){try{var s=JSON.parse(localStorage.getItem("bioAdv2"));return s&&s.coins!==undefined?s:defS()}catch(e){return defS()}}
var S=loadS();function saveS(){localStorage.setItem("bioAdv2",JSON.stringify(S))}
var currentChapter=null,currentChapterIdx=-1,currentStage=null,currentStageIdx=-1,currentQuestions=[],currentQIndex=0,correctCount=0,wrongCount=0;
function isChapter2Unlocked(){if(S.c2unlocked)return true;var ch1=CHS[0];for(var i=0;i<ch1.stages.length;i++){if(!S.stars[ch1.stages[i].name]||S.stars[ch1.stages[i].name]<1)return false}S.c2unlocked=true;saveS();return true}
function updateStats(){document.getElementById('lvDisplay').textContent='Lv.'+S.lv;document.getElementById('titleDisplay').textContent=LVT[S.lv-1]||'生物之神';document.getElementById('coinDisplay').textContent=S.coins;document.getElementById('streakDisplay').textContent=S.streak}
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active');if(id==='homeScreen')renderHome()}
function renderHome(){var html='';for(var i=0;i<CHS.length;i++){var ch=CHS[i];var locked=(i===1&&!isChapter2Unlocked());var allDone=!locked&&ch.stages.every(function(s){return S.stars[s.name]&&S.stars[s.name]>=1});var cls='chapter';if(locked)cls+=' locked';else if(allDone)cls+=' done';else cls+=' current';var tag=locked?'<span class="chapter-tag tag-locked">锁定</span>':allDone?'<span class="chapter-tag tag-done">已完成</span>':'<span class="chapter-tag tag-current">当前</span>';var stars='';if(!locked){for(var j=0;j<ch.stages.length;j++){var st=S.stars[ch.stages[j].name]||0;stars+='<span title="'+ch.stages[j].name+'">'+'★'.repeat(st)+'☆'.repeat(3-st)+'</span> '}}html+='<div class="'+cls+'" onclick="selectChapter('+i+')"><div class="chapter-title">'+ch.name+'</div><div class="chapter-desc">'+ch.stages.length+' 个关卡 '+stars+'</div>'+(locked?'<div class="unlock-hint">完成「人体的营养」全部关卡后解锁</div>':'')+tag+'</div>'}document.getElementById('chapterList').innerHTML=html}
function selectChapter(idx){if(idx===1&&!isChapter2Unlocked())return;currentChapter=CHS[idx];currentChapterIdx=idx;document.getElementById('chapterTitle').textContent=currentChapter.name;renderStages();showScreen('stageScreen')}
function renderStages(){var html='';for(var i=0;i<currentChapter.stages.length;i++){var st=currentChapter.stages[i];var stars=S.stars[st.name]||0;html+='<div class="stage" onclick="startStage('+i+')"><span class="stage-name">'+st.name+'</span><span class="stage-stars">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</span></div>'}document.getElementById('stageList').innerHTML=html}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function startStage(idx){currentStageIdx=idx;currentStage=currentChapter.stages[idx];var pool=shuffle(currentStage.qs.slice());currentQuestions=pool.slice(0,10);for(var i=0;i<currentQuestions.length;i++){var q=currentQuestions[i];var origAnswer=q.o[q.a];q.o=shuffle(q.o);q.a=q.o.indexOf(origAnswer)}currentQIndex=0;correctCount=0;wrongCount=0;showQuestion();showScreen('quizScreen')}
function showQuestion(){var q=currentQuestions[currentQIndex];document.getElementById('currentQ').textContent=currentQIndex+1;document.getElementById('totalQ').textContent=currentQuestions.length;document.getElementById('progressFill').style.width=((currentQIndex/currentQuestions.length)*100)+'%';var diffClass='diff-'+q.d;var diffText=q.d==='easy'?'基础':q.d==='med'?'中等':'困难';document.getElementById('questionText').innerHTML=q.q+'<span class="difficulty '+diffClass+'">'+diffText+'</span>';var html='';for(var i=0;i<q.o.length;i++){html+='<div class="option" onclick="selectOption('+i+')" data-idx="'+i+'">'+String.fromCharCode(65+i)+'. '+q.o[i]+'</div>'}document.getElementById('optionsBox').innerHTML=html;document.getElementById('hintBox').classList.remove('show');document.getElementById('hintBox').textContent='💡 '+q.h}
function selectOption(idx){var q=currentQuestions[currentQIndex];var opts=document.querySelectorAll('.option');for(var i=0;i<opts.length;i++){opts[i].classList.add('disabled');if(parseInt(opts[i].dataset.idx)===q.a)opts[i].classList.add('correct')}if(idx===q.a){correctCount++}else{wrongCount++;for(var i=0;i<opts.length;i++){if(parseInt(opts[i].dataset.idx)===idx)opts[i].classList.add('wrong')}document.getElementById('hintBox').classList.add('show')}setTimeout(function(){currentQIndex++;if(currentQIndex<currentQuestions.length)showQuestion();else showResult()},1500)}
function showResult(){var total=currentQuestions.length;var accuracy=correctCount/total;var stars=accuracy>=0.9?3:accuracy>=0.7?2:accuracy>=0.5?1:0;var prevStars=S.stars[currentStage.name]||0;if(stars>prevStars)S.stars[currentStage.name]=stars;var baseCoins=correctCount*10+stars*20;S.coins+=baseCoins;S.xp+=correctCount*10+stars*20;while(S.xp>=S.lv*100){S.xp-=S.lv*100;S.lv++}var wasLocked=!S.c2unlocked;var justUnlocked=false;if(wasLocked&&isChapter2Unlocked())justUnlocked=true;saveS();updateStats();document.getElementById('resultIcon').textContent=stars===3?'🏆':stars===2?'🥈':stars===1?'🥉':'💪';document.getElementById('resultTitle').textContent=stars===3?'完美通关！':stars===2?'优秀！':stars===1?'及格！':'继续加油！';document.getElementById('correctNum').textContent=correctCount;document.getElementById('wrongNum').textContent=wrongCount;document.getElementById('starNum').textContent=stars;if(baseCoins>0){document.getElementById('rewardBox').style.display='block';document.getElementById('rewardCoins').textContent=baseCoins}else{document.getElementById('rewardBox').style.display='none'}if(justUnlocked){document.getElementById('unlockBox').style.display='block';document.getElementById('unlockBox').textContent='🔓 恭喜！「人体内物质的运输与代谢」已解锁！'}else{document.getElementById('unlockBox').style.display='none'}var stageIdx=currentChapter.stages.indexOf(currentStage);document.getElementById('nextStageBtn').style.display=stageIdx<currentChapter.stages.length-1?'inline-block':'none';showScreen('resultScreen')}
function retryStage(){startStage(currentStageIdx)}
function nextStage(){var idx=currentStageIdx;if(idx<currentChapter.stages.length-1)startStage(idx+1)}
updateStats();renderHome();
</script>
