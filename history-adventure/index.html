<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>历史大闯关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#333}
.container{max-width:800px;margin:0 auto;padding:20px}
.header{text-align:center;color:#fff;margin-bottom:20px}
.header h1{font-size:28px;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,0.3)}
.stats{display:flex;justify-content:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.stat-box{background:rgba(255,255,255,0.95);padding:15px 25px;border-radius:15px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.2);min-width:100px}
.stat-box .value{font-size:24px;font-weight:bold;color:#667eea}
.stat-box .label{font-size:12px;color:#666;margin-top:5px}
.screen{display:none;background:rgba(255,255,255,0.98);border-radius:20px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.screen.active{display:block}
.btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;padding:12px 25px;border-radius:25px;cursor:pointer;font-size:16px;transition:transform 0.2s,box-shadow 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(102,126,234,0.4)}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.essay-btn{display:block;background:linear-gradient(135deg,#e74c3c 0%,#c0392b 100%);color:#fff;border-radius:15px;padding:20px;margin-bottom:20px;cursor:pointer;transition:all 0.2s;text-decoration:none}.essay-btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(231,76,60,0.4)}.essay-btn .title{font-size:18px;font-weight:bold;margin-bottom:8px}.essay-btn .desc{font-size:14px;opacity:0.9}
.chapter-list{display:grid;gap:15px}
.chapter{background:#f8f9fa;border-radius:15px;padding:20px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:2px solid transparent}
.chapter:hover{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,0.1)}
.chapter.current{border-color:#667eea;background:#f0f4ff}
.chapter.locked{opacity:0.6;cursor:not-allowed}
.chapter.done{border-color:#28a745;background:#f0fff4}
.chapter-title{font-size:18px;font-weight:bold;color:#333;margin-bottom:8px}
.chapter-desc{font-size:14px;color:#666}
.chapter-tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;margin-top:10px}
.tag-current{background:#667eea;color:#fff}
.tag-locked{background:#6c757d;color:#fff}
.tag-done{background:#28a745;color:#fff}
.stage-list{display:grid;gap:12px;margin-top:20px}
.stage{background:#f8f9fa;border-radius:12px;padding:15px;cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center}
.stage:hover{background:#e9ecef}
.stage-name{font-weight:bold;color:#333}
.stage-stars{color:#ffc107;font-size:18px}
.quiz-container{text-align:center}
.progress{margin-bottom:20px}
.progress-bar{height:8px;background:#e9ecef;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);transition:width 0.3s}
.progress-text{font-size:14px;color:#666;margin-top:8px}
.question{font-size:20px;font-weight:bold;color:#333;margin-bottom:25px;line-height:1.6}
.options{display:grid;gap:12px;max-width:500px;margin:0 auto}
.option{background:#f8f9fa;border:2px solid #e9ecef;border-radius:12px;padding:15px;cursor:pointer;transition:all 0.2s;text-align:left}
.option:hover{border-color:#667eea;background:#f0f4ff}
.option.correct{border-color:#28a745;background:#d4edda}
.option.wrong{border-color:#dc3545;background:#f8d7da}
.option.disabled{pointer-events:none;opacity:0.7}
.hint{background:#fff3cd;border:1px solid #ffeaa7;border-radius:10px;padding:15px;margin-top:20px;color:#856404;display:none}
.hint.show{display:block}
.result{text-align:center;padding:40px 20px}
.result-icon{font-size:80px;margin-bottom:20px}
.result-title{font-size:28px;font-weight:bold;color:#333;margin-bottom:15px}
.result-stats{display:flex;justify-content:center;gap:30px;margin:25px 0}
.result-stat{text-align:center}
.result-stat .num{font-size:36px;font-weight:bold;color:#667eea}
.result-stat .txt{font-size:14px;color:#666}
.reward{background:linear-gradient(135deg,#ffd700 0%,#ffaa00 100%);color:#fff;padding:20px;border-radius:15px;margin:20px 0;font-size:18px;font-weight:bold}
.btn-group{display:flex;gap:15px;justify-content:center;margin-top:25px;flex-wrap:wrap}
.badge-list{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:15px}
.badge{background:#f8f9fa;border-radius:10px;padding:10px 15px;font-size:14px;display:flex;align-items:center;gap:8px}
.badge.locked{opacity:0.5}
.difficulty{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;margin-left:10px}
.diff-l1{background:#d4edda;color:#155724}
.diff-l2{background:#fff3cd;color:#856404}
.diff-l3{background:#f8d7da;color:#721c24}
.diff-l4{background:#343a40;color:#fff}
.material-box{background:#e7f3ff;border:1px solid #b8daff;border-radius:12px;padding:20px;margin-bottom:20px;text-align:left;font-size:15px;line-height:1.8;white-space:pre-wrap}

/* 错题本 & 学习报告 & 专项训练 */
.wrong-btn,.report-btn,.train-btn{display:inline-block;padding:8px 16px;border-radius:20px;margin:5px;font-size:13px;cursor:pointer;border:none;font-weight:bold}
.wrong-btn{background:#ff6b6b;color:#fff}
.report-btn{background:#4ecdc4;color:#fff}
.train-btn{background:#45b7d1;color:#fff}
.wrong-btn:hover,.report-btn:hover,.train-btn:hover{opacity:0.85;transform:scale(1.05)}
.tool-bar{display:flex;justify-content:center;flex-wrap:wrap;margin:15px 0}
.wrong-list{max-height:60vh;overflow-y:auto;padding:10px}
.wrong-item{background:#fff3f3;border-left:3px solid #ff6b6b;padding:10px;margin:8px 0;border-radius:0 8px 8px 0;font-size:13px}
.wrong-item .q-text{font-weight:bold;margin-bottom:5px}
.wrong-item .q-info{color:#999;font-size:12px}
.wrong-item .q-answer{color:#2ecc71;margin-top:4px}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;justify-content:center}
.filter-chip{padding:5px 12px;border-radius:15px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#f8f9fa;transition:all .2s}
.filter-chip.active{background:#007bff;color:#fff;border-color:#007bff}
.stat-card{background:#fff;border-radius:12px;padding:15px;margin:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);text-align:center}
.stat-card .stat-num{font-size:28px;font-weight:bold;color:#2c3e50}
.stat-card .stat-label{font-size:12px;color:#999;margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.chart-bar{display:flex;align-items:center;margin:4px 0;font-size:12px}
.chart-bar .bar-label{width:70px;text-align:right;margin-right:8px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar .bar-fill{height:18px;border-radius:9px;min-width:4px;transition:width .5s}
.chart-bar .bar-val{margin-left:6px;color:#999;font-size:11px}
.empty-state{text-align:center;padding:40px 20px;color:#999}
.empty-state .empty-icon{font-size:48px;margin-bottom:10px}
.back-btn{display:inline-block;padding:8px 20px;background:#6c757d;color:#fff;border-radius:20px;cursor:pointer;font-size:13px;margin:10px}
.back-btn:hover{background:#5a6268}
.retry-wrong-btn{display:inline-block;padding:10px 24px;background:#ff6b6b;color:#fff;border-radius:25px;cursor:pointer;font-size:14px;font-weight:bold;margin:10px}
.retry-wrong-btn:hover{background:#e55555}
.essay-stage{background:linear-gradient(135deg,#fff5f5 0%,#ffe5e5 100%);border:2px solid #e74c3c}
.essay-stage:hover{border-color:#c0392b;box-shadow:0 5px 20px rgba(231,76,60,0.2)}
.stage-name.essay-title{color:#e74c3c}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>历史大闯关</h1>
    <p>七年级下册历史知识挑战</p>
  </div>
  
  <div class="stats">
    <div class="stat-box">
      <div class="value" id="lvDisplay">Lv.1</div>
      <div class="label" id="titleDisplay">历史新手</div>
    </div>
    <div class="stat-box">
      <div class="value" id="coinDisplay">0</div>
      <div class="label">金币</div>
    </div>
    <div class="stat-box">
      <div class="value" id="streakDisplay">0</div>
      <div class="label">连胜</div>
    </div>
  </div>

  <div id="homeScreen" class="screen active">
    <h2 style="margin-bottom:20px;text-align:center">选择章节</h2>
    <div class="tool-bar"><span class="wrong-btn" onclick="showWrongBook()">📓 错题本</span><span class="report-btn" onclick="showReport()">📊 学习报告</span><span class="train-btn" onclick="showTrain()">🎯 专项训练</span></div>
    <a href="./essay-training.html" class="essay-btn">
      <div class="title">📝 论述题特训</div>
      <div class="desc">掌握答题技巧，轻松应对论述题</div>
    </a>
    <div id="chapterList" class="chapter-list"></div>
  </div>

  
  <!-- Wrong Book Screen -->
  <div id="wrongScreen" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>📓 错题本</h2>
      <span class="back-btn" onclick="showScreen('homeScreen')">← 返回</span>
    </div>
    <div class="filter-bar" id="wrongFilter"></div>
    <div id="wrongSummary" style="text-align:center;margin:10px 0;font-size:14px;color:#666"></div>
    <div class="wrong-list" id="wrongList"></div>
    <div style="text-align:center" id="wrongActions"></div>
  </div>

  <!-- Report Screen -->
  <div id="reportScreen" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>📊 学习报告</h2>
      <span class="back-btn" onclick="showScreen('homeScreen')">← 返回</span>
    </div>
    <div class="stat-grid" id="reportStats"></div>
    <h3 style="margin:15px 0 5px;font-size:14px">章节正确率</h3>
    <div id="reportChart"></div>
    <h3 style="margin:15px 0 5px;font-size:14px">薄弱知识点</h3>
    <div id="weakPoints"></div>
  </div>

  <!-- Train Screen -->
  <div id="trainScreen" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>🎯 专项训练</h2>
      <span class="back-btn" onclick="showScreen('homeScreen')">← 返回</span>
    </div>
    <div style="padding:10px">
      <h3 style="font-size:14px;margin:10px 0">选择训练模式</h3>
      <div id="trainOptions"></div>
    </div>
  </div>

<div id="stageScreen" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 id="chapterTitle">章节标题</h2>
      <button class="btn" onclick="showScreen('homeScreen')">返回</button>
    </div>
    <div id="stageList" class="stage-list"></div>
  </div>

  <div id="quizScreen" class="screen">
    <div class="quiz-container">
      <div class="progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text">题目 <span id="currentQ">1</span> / <span id="totalQ">10</span></div>
      </div>
      <div id="questionBox">
        <div class="question" id="questionText">题目内容</div>
        <div class="options" id="optionsBox"></div>
        <div class="hint" id="hintBox"></div>
      </div>
    </div>
  </div>

  <div id="resultScreen" class="screen">
    <div class="result">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle">闯关成功！</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="num" id="correctNum">0</div>
          <div class="txt">答对</div>
        </div>
        <div class="result-stat">
          <div class="num" id="wrongNum">0</div>
          <div class="txt">答错</div>
        </div>
        <div class="result-stat">
          <div class="num" id="starNum">0</div>
          <div class="txt">获得星星</div>
        </div>
      </div>
      <div class="reward" id="rewardBox" style="display:none">
        获得 <span id="rewardCoins">0</span> 金币！
      </div>
      <div id="newBadgeBox" style="margin-top:15px"></div>
      <div id="unlockBox" style="display:none;margin-top:15px;background:linear-gradient(135deg,#28a745,#20c997);color:#fff;padding:15px;border-radius:12px;font-weight:bold"></div>
      <div class="btn-group">
        <button class="btn" onclick="retryStage()">再试一次</button>
        <button class="btn" onclick="showScreen('stageScreen')">返回关卡</button>
        <button class="btn" id="nextStageBtn" onclick="nextStage()" style="display:none">下一关</button>
      </div>
    </div>
  </div>
</div>
<script>
// 题库数据 - 更新版（含第5课和第7课）

var ESSAY_TRAINS = [{"title":"观点提炼","questions":[{"material":"商鞅变法规定：奖励耕织，生产粮食布帛多的人可免除徭役；奖励军功，立军功者可获得爵位和田宅。","question":"从材料中提炼一个最佳观点：","options":["商鞅变法是否成功？","商鞅变法调动了农民和士兵的生产作战积极性","商鞅变法内容很丰富","我认为商鞅变法很重要"],"answer":1,"hint":"观点必须是陈述句，不能是疑问句。选项A是疑问句，排除。选项C和D太宽泛。选项B准确提炼了奖励耕织和奖励军功的作用。","difficulty":"easy"},{"material":"秦始皇统一度量衡、货币，使得全国有了统一的计量标准和货币制度。","question":"最能反映材料主旨的观点是：","options":["秦始皇统一了度量衡和货币","统一度量衡、货币有利于经济交流和巩固统一","秦朝的统一措施很多","度量衡是什么？"],"answer":1,"hint":"选项B揭示了统一措施的意义——促进经济交流和巩固统一，是最佳观点。","difficulty":"easy"},{"material":"唐太宗曾说：'君，舟也；人，水也；水能载舟，亦能覆舟。'","question":"这段话体现了唐太宗的什么治国思想？","options":["以民为本","依法治国","重农抑商","对外开放"],"answer":0,"hint":"水能载舟亦能覆舟，形象地说明百姓的力量，体现了以民为本的思想。","difficulty":"easy"},{"material":"忆昔开元全盛日，小邑犹藏万家室。稻米流脂粟米白，公私仓廪俱丰实。——杜甫《忆昔》","question":"这首诗描述的是哪个时期的盛世景象？","options":["贞观之治","开元盛世","文景之治","康乾盛世"],"answer":1,"hint":"诗中'开元'指的是唐玄宗年号，描述的是开元盛世。","difficulty":"easy"},{"material":"玄奘西行取经，历时17年，行程5万里，带回了657部佛经。他还根据旅途见闻，撰写了《大唐西域记》。","question":"材料反映了玄奘西行的哪项重要贡献？","options":["传播了佛教文化","保存了中亚和印度半岛的历史地理资料","加强了中印军事同盟","推动了唐朝的领土扩张"],"answer":1,"hint":"《大唐西域记》是研究古代中亚和印度历史地理的重要文献。","difficulty":"easy"},{"material":"唐太宗被各族首领尊称为'天可汗'，体现了唐朝的民族政策是：","question":"从'天可汗'称号可以看出唐朝的民族政策特点是：","options":["武力征服为主","开明平等，民族交融","闭关锁国","和亲为主"],"answer":1,"hint":"天可汗称号体现各族对唐太宗的尊重，反映了开明平等的民族政策。","difficulty":"easy"},{"material":"鉴真东渡日本，前后6次才成功到达。他在日本传播佛教，还带去了建筑、雕塑、医药等知识。","question":"鉴真东渡日本的历史意义是什么？","options":["加强了中日军事同盟","促进了中日文化交流","扩大了唐朝的疆域","传播了儒家思想"],"answer":1,"hint":"鉴真东渡促进了中日文化交流，对日本文化产生了深远影响。","difficulty":"easy"},{"material":"唐朝时，长安、洛阳、扬州、广州等城市聚集了来自世界各地的商人和使节。","question":"根据材料，唐朝对外交往的特点是什么？","options":["闭关锁国，限制交流","开放包容，交流频繁","战争不断，冲突激烈","单向输出，不接纳外来文化"],"answer":1,"hint":"唐朝实行开放的外交政策，与亚非欧多个国家和地区有频繁的交往。","difficulty":"easy"},{"material":"元朝实行行省制度，行省'有钱粮、兵甲、屯种、漕运、军马重务，无不领之'，但重大事务须向中央请示。","question":"对行省权力特点的准确概括是：","options":["行省权力很大","行省权力受中央节制，体现了中央集权","行省什么都能管","行省制度很完善"],"answer":1,"hint":"选项B准确概括了行省权力的两面性——既有较大权力又受中央节制，体现了中央集权原则。","difficulty":"easy"},   {"id":"master_sui","i":"#","n":"隋唐大师","d":"隋唐时期全部小节满星"},
  {"id":"master_song","i":"%","n":"宋元大师","d":"辽宋夏金元时期全部小节满星"},
  {"id":"review_done","i":"&","n":"温故知新","d":"完成所有复习关卡"},
  {"id":"material_pro","i":"M","n":"材料分析高手","d":"正确完成10道材料题"},
  {"id":"challenge_l4","i":"C","n":"挑战达人","d":"完成10道L4难度题目"}
];

// 难度标签映射
var DIFN = {
  "l1": {"c": "diff-l1", "t": "🟢L1基础"},
  "l2": {"c": "diff-l2", "t": "🟡L2理解"},
  "l3": {"c": "diff-l3", "t": "🔴L3分析"},
  "l4": {"c": "diff-l4", "t": "⚫L4挑战"},
  "easy": {"c": "diff-l1", "t": "🟢基础"},
  "med": {"c": "diff-l2", "t": "🟡中等"},
  "hard": {"c": "diff-l3", "t": "🔴困难"}
};

// 状态管理
var S = loadS();
var currentChapter = null;
var currentChapterIdx = -1;
var currentStage = null;
var currentStageIdx = -1;
var currentQuestions = [];
var currentQIndex = 0;
var correctCount = 0;
var wrongCount = 0;
var materialCorrectCount = 0;

function defS(){
  return{
    coins:0,
    xp:0,
    lv:1,
    streak:0,
    lastDay:null,
    stars:{},
    badges:[],
    totOk:0,
    totAns:0,
    totDays:0,
    c2unlocked:false,
    materialCount:0, // 材料题正确数
    l4Count:0,
    totWrong:0,
    wrongQs:[]       // 错题记录
  }
}

function loadS(){
  try{
    var s=JSON.parse(localStorage.getItem("historyAdv3"));
    return s&&s.coins!==undefined?s:defS()
  }catch(e){
    return defS()
  }
}

function saveS(){
  localStorage.setItem("historyAdv3",JSON.stringify(S))
}

// 更新第二章解锁逻辑（现在需要隋唐6关全通）
function isChapter2Unlocked(){
  if(S.c2unlocked) return true;
  var ch1 = CHS[0];
  if(ch1.stages.length < 1) return false;
  for(var i=0;i<ch1.stages.length;i++){
    if(!S.stars[ch1.stages[i].name] || S.stars[ch1.stages[i].name] < 1) return false;
  }
  S.c2unlocked = true;
  saveS();
  return true;
}

function updateStats(){
  document.getElementById('lvDisplay').textContent='Lv.'+S.lv;
  document.getElementById('titleDisplay').textContent=LVT[S.lv-1]||'历史之神';
  document.getElementById('coinDisplay').textContent=S.coins;
  document.getElementById('streakDisplay').textContent=S.streak;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  document.getElementById(id).classList.add('active');
  if(id==='homeScreen') renderHome();
  if(id==='stageScreen') renderStages();
}

function renderHome(){
  var html='';
  for(var i=0;i<CHS.length;i++){
    var ch=CHS[i];
    var locked = (i===1 && !isChapter2Unlocked());
    var allDone = !locked && ch.stages.every(function(s){return S.stars[s.name]&&S.stars[s.name]>=1});
    
    var tagClass = locked ? 'tag-locked' : allDone ? 'tag-done' : 'tag-current';
    var tagText = locked ? '🔒 未解锁' : allDone ? '✓ 已完成' : '当前章节';
    
    html+='<div class="chapter '+(locked?'locked':allDone?'done':'current')+'" onclick="'+(locked?'':'selectChapter('+i+')')+'">';
    html+='<div class="chapter-title">'+ch.name+'</div>';
    html+='<div class="chapter-desc">'+ch.stages.length+'个关卡 · '+ch.stages.reduce(function(a,s){return a+(s.qs?s.qs.length:0)},0)+'道题目</div>';
    html+='<span class="chapter-tag '+tagClass+'">'+tagText+'</span>';
    html+='</div>';
  }
  document.getElementById('chapterList').innerHTML=html;
}

function selectChapter(idx){
  currentChapterIdx = idx;
  currentChapter = CHS[idx];
  document.getElementById('chapterTitle').textContent = currentChapter.name;
  renderStages();
  showScreen('stageScreen');
}

function renderStages(){
  var html='';
  for(var i=0;i<currentChapter.stages.length;i++){
    var st = currentChapter.stages[i];
    var isEssay = (st.type === 'essay');
    var stars = S.stars[st.name] || 0;
    var starStr = '';
    for(var j=0;j<3;j++){
      starStr += j<stars ? '★' : '☆';
    }
    
    var locked = false;
    if(i>0){
      var prevStage = currentChapter.stages[i-1];
      if(!S.stars[prevStage.name] || S.stars[prevStage.name] < 1){
        locked = true;
      }
    }
    
    var extraClass = locked ? 'locked' : (isEssay ? 'essay-stage' : '');
    var icon = st.icon || (isEssay ? '📝' : '');
    
    html+='<div class="stage '+extraClass+'" onclick="'+(locked?'':(isEssay?'startEssayStage('+i+')':'startStage('+i+')'))+'">';
    html+='<div class="stage-name '+(isEssay?'essay-title':'')+'">'+(icon?icon+' ':'')+st.name+(locked?' 🔒':'')+'</div>';
    html+='<div class="stage-stars">'+starStr+'</div>';
    html+='</div>';
  }
  document.getElementById('stageList').innerHTML=html;
}

function startStage(idx){
  currentStageIdx = idx;
  currentStage = currentChapter.stages[idx];
  currentQuestions = currentStage.qs.slice();
  currentQIndex = 0;
  correctCount = 0;
  wrongCount = 0;
  materialCorrectCount = 0;
  
  document.getElementById('totalQ').textContent = currentQuestions.length;
  showScreen('quizScreen');
  showQuestion();
}

function showQuestion(){
  var q = currentQuestions[currentQIndex];
  document.getElementById('currentQ').textContent = currentQIndex + 1;
  
  var progress = (currentQIndex / currentQuestions.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  
  // 获取难度信息
  var diffInfo = DIFN[q.d] || DIFN["l1"];
  var diffClass = diffInfo.c;
  var diffText = diffInfo.t;
  
  // 检查是否是材料题
  var isMaterial = q.type === 'material';
  
  var questionHtml = '';
  if(isMaterial){
    questionHtml = '<div class="material-box">'+q.q.replace(/\n/g,'<br>')+'</div>';
  } else {
    questionHtml = q.q;
  }
  
  questionHtml += '<span class="difficulty '+diffClass+'">'+diffText+'</span>';
  
  document.getElementById('questionText').innerHTML = questionHtml;
  
  var html='';
  for(var i=0;i<q.o.length;i++){
    html+='<div class="option" onclick="selectOption('+i+')" data-idx="'+i+'">'+String.fromCharCode(65+i)+'. '+q.o[i]+'</div>';
  }
  document.getElementById('optionsBox').innerHTML = html;
  document.getElementById('hintBox').classList.remove('show');
  document.getElementById('hintBox').textContent = '💡 '+q.h;
}

function selectOption(idx){
  var q = currentQuestions[currentQIndex];
  var opts = document.querySelectorAll('.option');
  
  for(var i=0;i<opts.length;i++){
    opts[i].classList.add('disabled');
    if(parseInt(opts[i].dataset.idx)===q.a){
      opts[i].classList.add('correct');
    }
  }
  
  if(idx===q.a){
    correctCount++;
    S.totOk++;
    if(q.type === 'material') {
      materialCorrectCount++;
      S.materialCount++;
    }
    if(q.d === 'l4') S.l4Count++;
  } else {
    wrongCount++;
    for(var i=0;i<opts.length;i++){
      if(parseInt(opts[i].dataset.idx)===idx) opts[i].classList.add('wrong');
    }
    document.getElementById('hintBox').classList.add('show');
    if(!S.wrongQs)S.wrongQs=[];
    var wk=currentStage.name+'_'+currentQIndex;
    var ex=false;
    for(var w=0;w<S.wrongQs.length;w++){if(S.wrongQs[w].key===wk){ex=true;S.wrongQs[w].count=(S.wrongQs[w].count||1)+1;S.wrongQs[w].yourPick=idx;break;}}
    if(!ex){S.wrongQs.push({key:wk,q:q.q,o:q.o,a:q.a,h:q.h,d:q.d||'l1',type:q.type||'',chapter:currentChapter.name,stage:currentStage.name,time:Date.now(),yourPick:idx,count:1});}
    S.totWrong=(S.totWrong||0)+1;
    saveS();
  }
  
  S.totAns++;
  
  setTimeout(function(){
    currentQIndex++;
    if(currentQIndex<currentQuestions.length){
      showQuestion();
    } else {
      showResult();
    }
  },1500);
}
function showResult(){
  var total = currentQuestions.length;
  var accuracy = correctCount / total;
  var stars = accuracy >= 0.9 ? 3 : accuracy >= 0.7 ? 2 : accuracy >= 0.5 ? 1 : 0;
  
  var prevStars = S.stars[currentStage.name] || 0;
  if(stars > prevStars){
    S.stars[currentStage.name] = stars;
  }
  
  // 计算奖励
  var baseCoins = correctCount * 10;
  var starBonus = stars * 20;
  var diffBonus = 0;
  for(var i=0;i<currentQuestions.length;i++){
    var d = currentQuestions[i].d;
    if(d==='l4' || d==='hard') diffBonus+=15;
    else if(d==='l3' || d==='med') diffBonus+=10;
    else if(d==='l2') diffBonus+=5;
  }
  var materialBonus = materialCorrectCount * 25; // 材料题额外奖励
  var totalCoins = baseCoins + starBonus + diffBonus + materialBonus;
  
  S.coins += totalCoins;
  S.xp += correctCount * 10 + stars * 20;
  
  while(S.xp >= S.lv * 100){
    S.xp -= S.lv * 100;
    S.lv++;
  }
  
  // 检查解锁
  var wasLocked = !S.c2unlocked;
  var justUnlocked = false;
  if(wasLocked && isChapter2Unlocked()){
    justUnlocked = true;
  }
  
  // 徽章检查
  var newBadges = [];
  if(!S.badges.includes('first_win')){
    S.badges.push('first_win');
    newBadges.push(BDGS.find(function(b){return b.id==='first_win'}));
  }
  if(stars===3 && !S.badges.includes('perfect')){
    S.badges.push('perfect');
    newBadges.push(BDGS.find(function(b){return b.id==='perfect'}));
  }
  if(S.coins>=500 && !S.badges.includes('rich')){
    S.badges.push('rich');
    newBadges.push(BDGS.find(function(b){return b.id==='rich'}));
  }
  if(S.materialCount>=10 && !S.badges.includes('material_pro')){
    S.badges.push('material_pro');
    newBadges.push(BDGS.find(function(b){return b.id==='material_pro'}));
  }
  if(S.l4Count>=10 && !S.badges.includes('challenge_l4')){
    S.badges.push('challenge_l4');
    newBadges.push(BDGS.find(function(b){return b.id==='challenge_l4'}));
  }
  
  // 检查章节大师徽章
  var ch1AllStars = CHS[0].stages.every(function(s){return S.stars[s.name]>=3});
  if(ch1AllStars && !S.badges.includes('master_sui')){
    S.badges.push('master_sui');
    newBadges.push(BDGS.find(function(b){return b.id==='master_sui'}));
  }
  
  var ch2AllStars = CHS[1] && CHS[1].stages.every(function(s){return S.stars[s.name]>=3});
  if(ch2AllStars && !S.badges.includes('master_song')){
    S.badges.push('master_song');
    newBadges.push(BDGS.find(function(b){return b.id==='master_song'}));
  }
  
  saveS();
  updateStats();
  
  document.getElementById('resultIcon').textContent = stars===3?'🏆':stars===2?'🥈':stars===1?'🥉':'💪';
  document.getElementById('resultTitle').textContent = stars===3?'完美通关！':stars===2?'优秀！':stars===1?'及格！':'继续加油！';
  document.getElementById('correctNum').textContent = correctCount;
  document.getElementById('wrongNum').textContent = wrongCount;
  document.getElementById('starNum').textContent = stars;
  
  if(totalCoins > 0){
    document.getElementById('rewardBox').style.display = 'block';
    document.getElementById('rewardCoins').textContent = totalCoins;
  } else {
    document.getElementById('rewardBox').style.display = 'none';
  }
  
  // 显示新徽章
  var badgeHtml = '';
  for(var i=0;i<newBadges.length;i++){
    if(newBadges[i]){
      badgeHtml+='<div class="badge">'+newBadges[i].i+' '+newBadges[i].n+'</div>';
    }
  }
  document.getElementById('newBadgeBox').innerHTML = badgeHtml;
  
  if(justUnlocked){
    document.getElementById('unlockBox').style.display = 'block';
    document.getElementById('unlockBox').textContent = '🎉 恭喜！已解锁第二章：辽宋夏金元时期！';
  } else {
    document.getElementById('unlockBox').style.display = 'none';
  }
  
  if(stars>=2 && currentStageIdx < currentChapter.stages.length - 1){
    document.getElementById('nextStageBtn').style.display = 'inline-block';
  } else {
    document.getElementById('nextStageBtn').style.display = 'none';
  }
  
  showScreen('resultScreen');
}

function retryStage(){
  startStage(currentStageIdx);
}

function nextStage(){
  if(currentStageIdx < currentChapter.stages.length - 1){
    startStage(currentStageIdx + 1);
  }
}


// ========== Wrong Book ==========
var wrongFilterChapter='all';
function showWrongBook(){
  if(!S.wrongQs||S.wrongQs.length===0){
    document.getElementById('wrongSummary').textContent='';
    document.getElementById('wrongList').innerHTML='<div class="empty-state"><div class="empty-icon">🎉</div><div>还没有错题，继续保持！</div></div>';
    document.getElementById('wrongActions').innerHTML='';
    document.getElementById('wrongFilter').innerHTML='';
    showScreen('wrongScreen');return;
  }
  var chapters=['all'];
  for(var i=0;i<S.wrongQs.length;i++){if(chapters.indexOf(S.wrongQs[i].chapter)===-1)chapters.push(S.wrongQs[i].chapter);}
  var fh='';
  for(var i=0;i<chapters.length;i++){
    var lb=chapters[i]==='all'?'全部':chapters[i];
    var cl=wrongFilterChapter===chapters[i]?'active':'';
    fh+='<span class="filter-chip '+cl+'" onclick="filterWrong(\''+chapters[i]+'\')">'+lb+'</span>';
  }
  document.getElementById('wrongFilter').innerHTML=fh;
  renderWrongList();
  showScreen('wrongScreen');
}
function filterWrong(ch){wrongFilterChapter=ch;showWrongBook();}
function renderWrongList(){
  var fd=S.wrongQs||[];
  if(wrongFilterChapter!=='all')fd=fd.filter(function(w){return w.chapter===wrongFilterChapter;});
  fd.sort(function(a,b){return(b.count||1)-(a.count||1);});
  document.getElementById('wrongSummary').textContent='共 '+fd.length+' 道错题';
  var h='',dm={l1:'🟡基础',l2:'🟢提高',l3:'🟡挑战',l4:'🔴困难'};
  for(var i=0;i<fd.length;i++){
    var w=fd[i];
    h+='<div class="wrong-item"><div class="q-text">'+(w.type==='material'?'📋 ':'')+w.q.substring(0,80)+(w.q.length>80?'...':'')+'</div>';
    h+='<div class="q-info">'+w.stage+' · '+(dm[w.d]||'🟡基础')+(w.count>1?' · 错'+w.count+'次':'')+'</div>';
    h+='<div class="q-answer">✅ '+String.fromCharCode(65+w.a)+'. '+w.o[w.a]+'</div>';
    h+='<div style="margin-top:6px"><span style="color:#007bff;cursor:pointer;font-size:12px" onclick="retrySingleWrong('+i+')">🔄 重练</span> <span style="color:#999;cursor:pointer;font-size:12px;margin-left:10px" onclick="removeWrong('+i+')">🗑 移除</span></div></div>';
  }
  document.getElementById('wrongList').innerHTML=h;
  var ah='';
  if(fd.length>0){ah='<span class="retry-wrong-btn" onclick="retryAllWrong()">🔄 重练全部错题</span><br><span style="color:#999;font-size:12px;cursor:pointer;margin-top:8px;display:inline-block" onclick="clearAllWrong()">清空错题本</span>';}
  document.getElementById('wrongActions').innerHTML=ah;
}
function removeWrong(idx){
  var fd=S.wrongQs||[];
  if(wrongFilterChapter!=='all')fd=fd.filter(function(w){return w.chapter===wrongFilterChapter;});
  var t=fd[idx];if(t){var ri=S.wrongQs.indexOf(t);if(ri>=0)S.wrongQs.splice(ri,1);saveS();renderWrongList();}
}
function clearAllWrong(){if(confirm('确定清空所有错题记录？')){S.wrongQs=[];saveS();showWrongBook();}}
function retrySingleWrong(idx){
  var fd=S.wrongQs||[];
  if(wrongFilterChapter!=='all')fd=fd.filter(function(w){return w.chapter===wrongFilterChapter;});
  var t=fd[idx];if(t){currentQuestions=[t];currentQIndex=0;correctCount=0;wrongCount=0;materialCorrectCount=0;document.getElementById('totalQ').textContent=1;showScreen('quizScreen');showQuestion();}
}
function retryAllWrong(){
  var fd=S.wrongQs||[];
  if(wrongFilterChapter!=='all')fd=fd.filter(function(w){return w.chapter===wrongFilterChapter;});
  if(fd.length===0)return;
  currentQuestions=fd.slice();currentQIndex=0;correctCount=0;wrongCount=0;materialCorrectCount=0;
  document.getElementById('totalQ').textContent=currentQuestions.length;showScreen('quizScreen');showQuestion();
}

// ========== Learning Report ==========
function showReport(){
  var tq=S.totAns||0,to=S.totOk||0,tw=S.wrongQs?S.wrongQs.length:0;
  var ac=tq>0?Math.round(to/tq*100):0;
  document.getElementById('reportStats').innerHTML=
    '<div class="stat-card"><div class="stat-num">'+tq+'</div><div class="stat-label">总答题</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:#2ecc71">'+ac+'%</div><div class="stat-label">正确率</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:#ff6b6b">'+tw+'</div><div class="stat-label">错题数</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+S.coins+'</div><div class="stat-label">金币</div></div>'+
    '<div class="stat-card"><div class="stat-num">Lv.'+S.lv+'</div><div class="stat-label">等级</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+S.streak+'</div><div class="stat-label">连胜</div></div>';
  var ch2='',colors=['#3498db','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
  for(var c2i=0;c2i<CHS.length;c2i++){
    var cOk=0,cTot=0;
    for(var s=0;s<CHS[c2i].stages.length;s++){
      var sn=CHS[c2i].stages[s].name,st2=S.stars[sn]||0;
      var qLen=CHS[c2i].stages[s].qs?CHS[c2i].stages[s].qs.length:0;
      if(qLen===0)continue;
      if(st2>=3)cOk+=qLen*0.9;
      else if(st2===2)cOk+=qLen*0.75;
      else if(st2===1)cOk+=qLen*0.55;
      cTot+=qLen;
    }
    var ca=cTot>0?Math.round(cOk/cTot*100):0;
    var co=colors[c2i%colors.length];
    var lb=CHS[c2i].name.length>8?CHS[c2i].name.substring(0,8)+'…':CHS[c2i].name;
    ch2+='<div class="chart-bar"><span class="bar-label">'+lb+'</span><span class="bar-fill" style="width:'+ca+'%;background:'+co+'"></span><span class="bar-val">'+ca+'%</span></div>';
  }
  document.getElementById('reportChart').innerHTML=ch2;
  var sw={};if(S.wrongQs){for(var i=0;i<S.wrongQs.length;i++){var w=S.wrongQs[i];sw[w.stage]=(sw[w.stage]||0)+(w.count||1);}}
  var wa=[];for(var k in sw)wa.push({name:k,count:sw[k]});
  wa.sort(function(a,b){return b.count-a.count;});
  var wh='';if(wa.length===0){wh='<div style="color:#999;font-size:13px;text-align:center;padding:10px">暂无薄弱项</div>';}
  else{for(var i=0;i<Math.min(5,wa.length);i++){wh+='<div class="chart-bar"><span class="bar-label">'+wa[i].name+'</span><span class="bar-fill" style="width:'+Math.min(100,wa[i].count*15)+'%;background:#ff6b6b"></span><span class="bar-val">错'+wa[i].count+'次</span></div>';}}
  document.getElementById('weakPoints').innerHTML=wh;
  showScreen('reportScreen');
}

// ========== Special Training ==========
function showTrain(){
  var h='<div style="margin:15px 0"><h4 style="font-size:14px;color:#666;margin-bottom:8px">按难度训练</h4>';
  var ds=[{d:'l1',n:'🟡 基础题',p:'夷实基础'},{d:'l2',n:'🟢 提高题',p:'能力提升'},{d:'l3',n:'🟡 挑战题',p:'思维进阶'},{d:'l4',n:'🔴 困难题',p:'极限挑战'}];
  for(var i=0;i<ds.length;i++){
    h+='<div style="display:inline-block;margin:5px;padding:10px 16px;background:#f0f4f8;border-radius:12px;cursor:pointer" onclick="trainByDiff(\''+ds[i].d+'\')"><div style="font-weight:bold;font-size:13px">'+ds[i].n+'</div><div style="font-size:11px;color:#999">'+ds[i].p+'</div></div>';
  }
  h+='</div><div style="margin:15px 0"><h4 style="font-size:14px;color:#666;margin-bottom:8px">按章节训练</h4>';
  for(var c2i=0;c2i<CHS.length;c2i++){
    h+='<div style="display:inline-block;margin:5px;padding:10px 16px;background:#e8f5e9;border-radius:12px;cursor:pointer" onclick="trainByChapter('+c2i+')"><div style="font-weight:bold;font-size:13px">'+CHS[c2i].name.substring(0,10)+'</div><div style="font-size:11px;color:#999">'+CHS[c2i].stages.length+'关</div></div>';
  }
  h+='</div><div style="margin:15px 0"><h4 style="font-size:14px;color:#666;margin-bottom:8px">按题型训练</h4>';
  h+='<div style="display:inline-block;margin:5px;padding:10px 16px;background:#fff3e0;border-radius:12px;cursor:pointer" onclick="trainByType(\'material\')"><div style="font-weight:bold;font-size:13px">📋 材料分析题</div><div style="font-size:11px;color:#999">史料解读专项</div></div>';
  h+='</div><div style="margin:15px 0"><h4 style="font-size:14px;color:#666;margin-bottom:8px">综合训练</h4>';
  h+='<div style="display:inline-block;margin:5px;padding:10px 16px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;cursor:pointer;color:#fff" onclick="trainRandom()"><div style="font-weight:bold;font-size:13px">🎲 随机20题</div><div style="font-size:11px;opacity:0.8">全题库随机抽取</div></div>';
  h+='</div>';
  document.getElementById('trainOptions').innerHTML=h;
  showScreen('trainScreen');
}
function collectAllQs(fn){
  var all=[];
  for(var c2i=0;c2i<CHS.length;c2i++){for(var s=0;s<CHS[c2i].stages.length;s++){if(!CHS[c2i].stages[s].qs)continue;for(var q=0;q<CHS[c2i].stages[s].qs.length;q++){var it=CHS[c2i].stages[s].qs[q];if(!fn||fn(it,c2i,s))all.push(it);}}}
  return all;
}
function shuffleArr(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function startTraining(qs){
  if(qs.length===0){alert('该分类下暂无题目');return;}
  currentQuestions=shuffleArr(qs).slice(0,20);currentQIndex=0;correctCount=0;wrongCount=0;materialCorrectCount=0;
  document.getElementById('totalQ').textContent=currentQuestions.length;showScreen('quizScreen');showQuestion();
}
function trainByDiff(d){startTraining(collectAllQs(function(it){return(it.d||'l1')===d;}));}
function trainByChapter(c){var qs=[];for(var s=0;s<CHS[c].stages.length;s++){if(CHS[c].stages[s].qs)qs=qs.concat(CHS[c].stages[s].qs);}startTraining(qs);}
function trainByType(t){startTraining(collectAllQs(function(it){return it.type===t;}));}
function trainRandom(){startTraining(collectAllQs());}

// ========== 论述题特训逻辑 ==========
var currentEssayStage = null;
var currentEssayQIdx = 0;
var currentEssayQs = [];
var essayCorrectCount = 0;
var essayWrongCount = 0;

function startEssayStage(idx){
  currentStageIdx = idx;
  currentStage = currentChapter.stages[idx];
  currentEssayStage = currentStage.trainings;
  currentEssayQIdx = 0;
  essayCorrectCount = 0;
  essayWrongCount = 0;
  currentEssayQs = [];
  
  // 合并所有训练的题目
  for(var i=0;i<currentEssayStage.length;i++){
    for(var j=0;j<currentEssayStage[i].questions.length;j++){
      currentEssayQs.push(currentEssayStage[i].questions[j]);
    }
  }
  
  document.getElementById('totalQ').textContent = currentEssayQs.length;
  showScreen('quizScreen');
  showEssayQuestion();
}

function showEssayQuestion(){
  var q = currentEssayQs[currentEssayQIdx];
  document.getElementById('currentQ').textContent = currentEssayQIdx + 1;
  
  var progress = (currentEssayQIdx / currentEssayQs.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  
  var html = '';
  
  // 显示材料
  if(q.material){
    html += '<div class="material-box">' + q.material.replace(/\n/g,'<br>') + '</div>';
  }
  
  // 显示题目
  var diffTag = q.difficulty ? '<span class="difficulty diff-'+q.difficulty+'">'+(q.difficulty==='easy'?'🟢简单':q.difficulty==='medium'?'🟡中等':'🔴困难')+'</span>' : '';
  html += '<div class="question">' + diffTag + q.question + '</div>';
  
  // 选项类型判断
  if(q.type === 'fill'){
    html += '<div class="fill-blank"><textarea class="textarea-box" id="essayFill" placeholder="请输入完整答案..."></textarea>';
    html += '<div class="word-count"><span id="wordCount">0</span> 字</div></div>';
    html += '<div class="btn-group"><button class="btn" onclick="submitEssayFill()">提交答案</button></div>';
  } else if(q.options && q.options[0] && q.options[0].text){
    // 多选题
    html += '<div class="checkboxes">';
    for(var i=0;i<q.options.length;i++){
      html += '<div class="checkbox-item"><input type="checkbox" id="cb'+i+'"><label for="cb'+i+'">'+q.options[i].text+'</label></div>';
    }
    html += '</div>';
    html += '<div class="btn-group"><button class="btn" onclick="submitEssayMulti()">提交答案</button></div>';
  } else {
    // 单选题
    html += '<div class="options">';
    for(var i=0;i<q.options.length;i++){
      html += '<div class="option" onclick="selectEssayOption('+i+')" id="opt'+i+'">' + q.options[i] + '</div>';
    }
    html += '</div>';
    html += '<div class="btn-group"><button class="btn" onclick="submitEssayOption()">提交答案</button></div>';
  }
  
  html += '<div class="hint" id="essayHint"></div>';
  html += '<div class="btn-group"><button class="btn" id="essayNextBtn" style="display:none;background:#6c757d" onclick="nextEssayQuestion()">下一题</button></div>';
  
  document.getElementById('quizContainer').innerHTML = html;
  
  // 字数统计
  var ta = document.getElementById('essayFill');
  if(ta){
    ta.oninput = function(){
      document.getElementById('wordCount').textContent = this.value.length;
    };
  }
}

var selectedEssayOption = -1;
function selectEssayOption(idx){
  document.querySelectorAll('.option').forEach(function(o){o.classList.remove('selected');});
  document.getElementById('opt'+idx).classList.add('selected');
  selectedEssayOption = idx;
}

function submitEssayOption(){
  if(selectedEssayOption === -1){alert('请先选择答案');return;}
  var q = currentEssayQs[currentEssayQIdx];
  var correct = (selectedEssayOption === q.answer);
  if(correct){
    essayCorrectCount++;
    document.getElementById('opt'+selectedEssayOption).classList.add('correct');
  } else {
    essayWrongCount++;
    document.getElementById('opt'+selectedEssayOption).classList.add('wrong');
    document.getElementById('opt'+q.answer).classList.add('correct');
    addWrongQ(q,'essay',currentChapterIdx,currentStageIdx);
  }
  document.getElementById('essayHint').className = 'hint show';
  document.getElementById('essayHint').innerHTML = '💡 '+q.hint;
  document.querySelectorAll('.option').forEach(function(o){o.classList.add('disabled');});
  document.getElementById('essayNextBtn').style.display = 'inline-block';
  selectedEssayOption = -1;
}

function submitEssayMulti(){
  var q = currentEssayQs[currentEssayQIdx];
  var correct = true;
  var missed = [];
  var wrong = [];
  
  for(var i=0;i<q.options.length;i++){
    var cb = document.getElementById('cb'+i);
    var item = cb.parentElement;
    if(cb.checked && !q.options[i].correct){
      correct = false;
      wrong.push(i);
      item.style.background='#f8d7da';
    } else if(!cb.checked && q.options[i].correct){
      correct = false;
      missed.push(i);
      item.style.background='#fff3cd';
    } else if(cb.checked && q.options[i].correct){
      item.style.background='#d4edda';
    }
  }
  
  if(correct){
    essayCorrectCount++;
  } else {
    essayWrongCount++;
    addWrongQ(q,'essay',currentChapterIdx,currentStageIdx);
  }
  
  document.getElementById('essayHint').className = 'hint show';
  document.getElementById('essayHint').innerHTML = '💡 '+q.hint;
  document.querySelectorAll('.checkbox-item input').forEach(function(c){c.disabled=true;});
  document.getElementById('essayNextBtn').style.display = 'inline-block';
}

function submitEssayFill(){
  var ta = document.getElementById('essayFill');
  var q = currentEssayQs[currentEssayQIdx];
  var userAnswer = ta.value.trim();
  
  // 简单匹配（实际应用中可以用更复杂的算法）
  var correct = (userAnswer.length > 20 && (userAnswer.indexOf(q.answer.substr(0,15)) !== -1 || q.answer.indexOf(userAnswer.substr(0,15)) !== -1));
  
  if(correct){
    essayCorrectCount++;
    ta.style.borderColor='#28a745';
  } else {
    essayWrongCount++;
    ta.style.borderColor='#dc3545';
    addWrongQ(q,'essay',currentChapterIdx,currentStageIdx);
  }
  
  // 显示参考答案
  var refBox = document.createElement('div');
  refBox.className = 'reference-box show';
  refBox.innerHTML = '<div class="reference-title">📖 参考答案</div><div class="reference-text">'+q.answer+'</div>';
  ta.parentElement.appendChild(refBox);
  
  document.getElementById('essayHint').className = 'hint show';
  document.getElementById('essayHint').innerHTML = '💡 '+q.hint;
  ta.disabled = true;
  document.getElementById('essayNextBtn').style.display = 'inline-block';
}

function nextEssayQuestion(){
  currentEssayQIdx++;
  if(currentEssayQIdx >= currentEssayQs.length){
    showEssayResult();
  } else {
    showEssayQuestion();
  }
}

function showEssayResult(){
  var total = currentEssayQs.length;
  var rate = Math.round((essayCorrectCount / total) * 100);
  
  // 记录星星
  var stageName = currentStage.name;
  var stars = rate >= 90 ? 3 : rate >= 70 ? 2 : rate >= 50 ? 1 : 0;
  S.stars[stageName] = Math.max(S.stars[stageName] || 0, stars);
  saveS();
  
  // 更新金币和正确率
  var coins = Math.round(essayCorrectCount * 10);
  S.coins += coins;
  S.totalAnswered += total;
  S.totalCorrect += essayCorrectCount;
  updateStats();
  saveS();
  
  // 显示结果
  var html = '<div class="result-icon">'+(rate>=70?'🎉':'😅')+'</div>';
  html += '<div class="result-title">论述题特训完成</div>';
  html += '<div class="result-stats">';
  html += '<div class="result-stat"><div class="num">'+essayCorrectCount+'</div><div class="txt">正确</div></div>';
  html += '<div class="result-stat"><div class="num">'+essayWrongCount+'</div><div class="txt">错误</div></div>';
  html += '<div class="result-stat"><div class="num">'+rate+'%</div><div class="txt">正确率</div></div>';
  html += '</div>';
  html += '<div class="reward">获得 '+coins+' 金币！</div>';
  html += '<div class="btn-group">';
  html += '<button class="btn" onclick="startEssayStage('+currentStageIdx+')">再试一次</button>';
  html += '<button class="btn" onclick="showScreen(\'stageScreen\')">返回关卡</button>';
  html += '</div>';
  
  document.getElementById('quizContainer').innerHTML = html;
}

// 初始化
updateStats();
renderHome();
</script>
