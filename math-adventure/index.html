<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>数学大冒险</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);min-height:100vh;color:#333}
.container{max-width:800px;margin:0 auto;padding:20px}
.header{text-align:center;color:#fff;margin-bottom:20px}
.header h1{font-size:28px;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,0.3)}
.stats{display:flex;justify-content:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.stat-box{background:rgba(255,255,255,0.95);padding:15px 25px;border-radius:15px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.2);min-width:100px}
.stat-box .value{font-size:24px;font-weight:bold;color:#11998e}
.stat-box .label{font-size:12px;color:#666;margin-top:5px}
.screen{display:none;background:rgba(255,255,255,0.98);border-radius:20px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.screen.active{display:block}
.btn{background:linear-gradient(135deg,#11998e 0%,#38ef7d 100%);color:#fff;border:none;padding:12px 25px;border-radius:25px;cursor:pointer;font-size:16px;transition:transform 0.2s,box-shadow 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(17,153,142,0.4)}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.btn.secondary{background:#6c757d}
.chapter-list{display:grid;gap:15px}
.chapter{background:#f8f9fa;border-radius:15px;padding:20px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:2px solid transparent}
.chapter:hover{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,0.1)}
.chapter.current{border-color:#11998e;background:#e8f8f5}
.chapter.locked{opacity:0.6;cursor:not-allowed}
.chapter.done{border-color:#28a745;background:#f0fff4}
.chapter-title{font-size:18px;font-weight:bold;color:#333;margin-bottom:8px}
.chapter-desc{font-size:14px;color:#666}
.chapter-stats{font-size:12px;color:#999;margin-top:8px}
.chapter-tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;margin-top:10px}
.tag-current{background:#11998e;color:#fff}
.tag-locked{background:#6c757d;color:#fff}
.tag-done{background:#28a745;color:#fff}
.stage-list{display:grid;gap:12px;margin-top:20px}
.stage{background:#f8f9fa;border-radius:12px;padding:15px;cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center}
.stage:hover{background:#e9ecef}
.stage-name{font-weight:bold;color:#333}
.stage-stars{color:#ffc107;font-size:18px}
.quiz-container{text-align:center}
.progress{margin-bottom:20px}
.progress-bar{height:8px;background:#e9ecef;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#11998e,#38ef7d);transition:width 0.3s}
.progress-text{font-size:14px;color:#666;margin-top:8px}
.question{font-size:20px;font-weight:bold;color:#333;margin-bottom:25px;line-height:1.6}
.options{display:grid;gap:12px;max-width:500px;margin:0 auto}
.option{background:#f8f9fa;border:2px solid #e9ecef;border-radius:12px;padding:15px;cursor:pointer;transition:all 0.2s;text-align:left}
.option:hover{border-color:#11998e;background:#e8f8f5}
.option.correct{border-color:#28a745;background:#d4edda}
.option.wrong{border-color:#dc3545;background:#f8d7da}
.option.disabled{pointer-events:none;opacity:0.7}
.hint{background:#fff3cd;border:1px solid #ffeaa7;border-radius:10px;padding:15px;margin-top:20px;color:#856404;display:none}
.hint.show{display:block}
.result{text-align:center;padding:40px 20px}
.result-icon{font-size:80px;margin-bottom:20px}
.result-title{font-size:28px;font-weight:bold;color:#333;margin-bottom:15px}
.result-stats{display:flex;justify-content:center;gap:30px;margin:25px 0}
.result-stat{text-align:center}
.result-stat .num{font-size:36px;font-weight:bold;color:#11998e}
.result-stat .txt{font-size:14px;color:#666}
.reward{background:linear-gradient(135deg,#ffd700 0%,#ffaa00 100%);color:#fff;padding:20px;border-radius:15px;margin:20px 0;font-size:18px;font-weight:bold}
.btn-group{display:flex;gap:15px;justify-content:center;margin-top:25px;flex-wrap:wrap}
.difficulty{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;margin-left:10px}
.diff-easy{background:#d4edda;color:#155724}
.diff-med{background:#fff3cd;color:#856404}
.diff-hard{background:#f8d7da;color:#721c24}
.archive-info{background:#e8f8f5;border-radius:12px;padding:15px;margin-bottom:20px;text-align:center}
.archive-info .count{font-size:24px;font-weight:bold;color:#11998e}
.archive-info .label{font-size:12px;color:#666}
.mastery-bar{height:6px;background:#e9ecef;border-radius:3px;margin-top:8px;overflow:hidden}
.mastery-fill{height:100%;background:linear-gradient(90deg,#28a745,#20c997);transition:width 0.3s}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📐 数学大冒险</h1>
    <p>七年级下册数学知识挑战</p>
  </div>
  
  <div class="stats">
    <div class="stat-box">
      <div class="value" id="lvDisplay">Lv.1</div>
      <div class="label" id="titleDisplay">数学新手</div>
    </div>
    <div class="stat-box">
      <div class="value" id="coinDisplay">0</div>
      <div class="label">金币</div>
    </div>
    <div class="stat-box">
      <div class="value" id="streakDisplay">0</div>
      <div class="label">连胜</div>
    </div>
  </div>

  <div id="homeScreen" class="screen active">
    <div id="archiveInfo" class="archive-info">
      <div style="display:flex;justify-content:center;gap:30px">
        <div><span class="count" id="activeCount">0</span><span class="label">活跃题目</span></div>
        <div><span class="count" id="archivedCount">0</span><span class="label">已掌握</span></div>
      </div>
      <button class="btn secondary" style="margin-top:10px;padding:8px 16px;font-size:14px" onclick="showArchiveScreen()">查看已掌握题目</button>
    </div>
    <h2 style="margin-bottom:20px;text-align:center">选择章节</h2>
    <div id="chapterList" class="chapter-list"></div>
  </div>

  <div id="archiveScreen" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2>📚 已掌握题目</h2>
      <button class="btn" onclick="showScreen('homeScreen')">返回</button>
    </div>
    <div id="archiveList" style="max-height:400px;overflow-y:auto"></div>
    <div class="btn-group" style="margin-top:20px">
      <button class="btn secondary" onclick="restoreAllArchived()">恢复全部题目</button>
      <button class="btn secondary" onclick="reviewArchived()">复习模式（随机10题）</button>
    </div>
  </div>

  <div id="stageScreen" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 id="chapterTitle">章节标题</h2>
      <button class="btn" onclick="showScreen('homeScreen')">返回</button>
    </div>
    <div id="stageList" class="stage-list"></div>
  </div>

  <div id="quizScreen" class="screen">
    <div class="quiz-container">
      <div class="progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text">题目 <span id="currentQ">1</span> / <span id="totalQ">10</span></div>
      </div>
      <div id="questionBox">
        <div class="question" id="questionText">题目内容</div>
        <div class="options" id="optionsBox"></div>
        <div class="hint" id="hintBox"></div>
        <button id="nextBtn" class="btn" style="display:none;margin-top:15px;" onclick="goNext()">继续 →</button>
      </div>
    </div>
  </div>

  <div id="resultScreen" class="screen">
    <div class="result">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle">闯关成功！</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="num" id="correctNum">0</div>
          <div class="txt">答对</div>
        </div>
        <div class="result-stat">
          <div class="num" id="wrongNum">0</div>
          <div class="txt">答错</div>
        </div>
        <div class="result-stat">
          <div class="num" id="starNum">0</div>
          <div class="txt">获得星星</div>
        </div>
      </div>
      <div class="reward" id="rewardBox" style="display:none">
        获得 <span id="rewardCoins">0</span> 金币！
      </div>
      <div id="archiveNotice" style="display:none;margin-top:15px;background:linear-gradient(135deg,#28a745,#20c997);color:#fff;padding:15px;border-radius:12px;font-weight:bold"></div>
      <div class="btn-group">
        <button class="btn" onclick="retryStage()">再试一次</button>
        <button class="btn" onclick="showScreen('stageScreen')">返回关卡</button>
        <button class="btn" id="nextStageBtn" onclick="nextStage()" style="display:none">下一关</button>
      </div>
    </div>
  </div>
</div>

<script>
// 题库数据
var CHS = [
  {
    "id": "c1",
    "name": "整式的乘除",
    "stages": [
      {
        "name": "幂的运算",
        "qs": [
          {"id":"c1s1q1","q":"计算：a³ · a² = ?","o":["a⁵","a⁶","a","a¹"],"a":0,"h":"同底数幂相乘，底数不变，指数相加：3+2=5","d":"easy"},
          {"id":"c1s1q2","q":"计算：(a²)³ = ?","o":["a⁵","a⁶","a⁸","a⁹"],"a":1,"h":"幂的乘方，底数不变，指数相乘：2×3=6","d":"easy"},
          {"id":"c1s1q3","q":"计算：(ab)² = ?","o":["a²b","ab²","a²b²","2ab"],"a":2,"h":"积的乘方，等于各因式乘方的积","d":"easy"},
          {"id":"c1s1q4","q":"计算：a⁵ ÷ a² = ?","o":["a³","a⁷","a¹⁰","a²·⁵"],"a":0,"h":"同底数幂相除，底数不变，指数相减：5-2=3","d":"easy"},
          {"id":"c1s1q5","q":"若 aⁿ · a² = a⁶，则 n = ?","o":["2","3","4","8"],"a":2,"h":"n + 2 = 6，所以 n = 4","d":"med"},
          {"id":"c1s1q6","q":"计算：(-2x²)³ = ?","o":["-8x⁶","8x⁶","-6x⁵","-2x⁶"],"a":0,"h":"(-2)³ = -8，(x²)³ = x⁶","d":"med"},
          {"id":"c1s1q7","q":"若 2ᵐ = 8，2ⁿ = 4，则 2ᵐ⁻ⁿ = ?","o":["2","4","8","32"],"a":0,"h":"2ᵐ⁻ⁿ = 2ᵐ ÷ 2ⁿ = 8 ÷ 4 = 2","d":"med"},
          {"id":"c1s1q8","q":"计算：(x³)² · x⁴ = ?","o":["x⁹","x¹⁰","x¹²","x⁸"],"a":1,"h":"(x³)² = x⁶，x⁶ · x⁴ = x¹⁰","d":"med"},
          {"id":"c1s1q9","q":"若 xᵃ = 3，xᵇ = 5，则 x²ᵃ⁺ᵇ = ?","o":["15","45","75","8"],"a":1,"h":"x²ᵃ⁺ᵇ = x²ᵃ · xᵇ = (xᵃ)² · xᵇ = 9 × 5 = 45","d":"hard"},
          {"id":"c1s1q10","q":"计算：(a²b³)² · (ab)³ = ?","o":["a⁷b⁹","a⁵b⁶","a⁴b⁶","a⁷b⁶"],"a":0,"h":"a⁴b⁶ · a³b³ = a⁷b⁹","d":"hard"}
        ]
      },
      {
        "name": "整式的乘法",
        "qs": [
          {"id":"c1s2q1","q":"计算：2x · 3x² = ?","o":["5x³","6x³","6x²","5x²"],"a":1,"h":"系数相乘，同底数幂相乘：2×3=6，x·x²=x³","d":"easy"},
          {"id":"c1s2q2","q":"计算：x(x + 2) = ?","o":["x² + 2","x² + 2x","x + 2x","x² + x"],"a":1,"h":"单项式乘多项式，分配律展开","d":"easy"},
          {"id":"c1s2q3","q":"计算：(x + 1)(x + 2) = ?","o":["x² + 2x + 2","x² + 3x + 2","x² + x + 2","x² + 3"],"a":1,"h":"展开：x² + 2x + x + 2 = x² + 3x + 2","d":"med"},
          {"id":"c1s2q4","q":"计算：(x - 1)(x + 1) = ?","o":["x² - 1","x² + 1","x² - 2x - 1","x² + 2x - 1"],"a":0,"h":"平方差公式：(a-b)(a+b) = a² - b²","d":"easy"},
          {"id":"c1s2q5","q":"计算：(x + 2)² = ?","o":["x² + 4","x² + 4x + 4","x² + 2x + 4","x² + 2"],"a":1,"h":"完全平方公式：(a+b)² = a² + 2ab + b²","d":"easy"},
          {"id":"c1s2q6","q":"计算：(2x - 3)² = ?","o":["4x² - 9","4x² - 12x + 9","4x² - 6x + 9","2x² - 6x + 9"],"a":1,"h":"(2x)² - 2×2x×3 + 9 = 4x² - 12x + 9","d":"med"},
          {"id":"c1s2q7","q":"若 (x + a)(x + b) = x² + 5x + 6，则 a + b = ?","o":["5","6","11","30"],"a":0,"h":"由 x² + (a+b)x + ab，得 a+b=5","d":"med"},
          {"id":"c1s2q8","q":"计算：(x + y)(x - y)(x² + y²) = ?","o":["x⁴ - y⁴","x⁴ + y⁴","x² - y²","x² + y²"],"a":0,"h":"(x²-y²)(x²+y²) = x⁴-y⁴","d":"hard"},
          {"id":"c1s2q9","q":"若 x + 1/x = 3，则 x² + 1/x² = ?","o":["7","9","5","11"],"a":0,"h":"(x+1/x)² = x²+2+1/x²=9，所以x²+1/x²=7","d":"hard"},
          {"id":"c1s2q10","q":"计算：(a + b + c)(a + b - c) = ?","o":["a² + b² - c²","(a+b)² - c²","a² + 2ab + b² - c²","以上都对"],"a":3,"h":"设a+b=m，则m²-c²=(a+b)²-c²=a²+2ab+b²-c²","d":"hard"}
        ]
      }
    ]
  },
  {
    "id": "c2",
    "name": "相交线与平行线",
    "stages": [
      {
        "name": "相交线",
        "qs": [
          {"id":"c2s1q1","q":"两条直线相交，形成几个角？","o":["2个","3个","4个","6个"],"a":2,"h":"两条直线相交形成4个角","d":"easy"},
          {"id":"c2s1q2","q":"对顶角的性质是？","o":["互补","相等","互余","和为180°"],"a":1,"h":"对顶角相等","d":"easy"},
          {"id":"c2s1q3","q":"若∠1和∠2是对顶角，∠1=50°，则∠2=?","o":["40°","50°","130°","140°"],"a":1,"h":"对顶角相等，所以∠2=50°","d":"easy"},
          {"id":"c2s1q4","q":"邻补角的关系是？","o":["相等","互补","互余","和为90°"],"a":1,"h":"邻补角互补，和为180°","d":"easy"},
          {"id":"c2s1q5","q":"若∠1与∠2互补，∠1=70°，则∠2=?","o":["20°","70°","110°","140°"],"a":2,"h":"互补两角和为180°，∠2=180°-70°=110°","d":"easy"},
          {"id":"c2s1q6","q":"两条直线相交所成的四个角中，若有一个角是90°，则其他三个角是？","o":["都是90°","都是60°","都是120°","不确定"],"a":0,"h":"两直线垂直时，四个角都是90°","d":"med"},
          {"id":"c2s1q7","q":"如图，直线AB、CD相交于O，若∠AOC=2∠BOC，则∠AOC=?","o":["60°","90°","120°","150°"],"a":2,"h":"∠AOC+∠BOC=180°，设∠BOC=x，则2x+x=180°，x=60°，∠AOC=120°","d":"med"},
          {"id":"c2s1q8","q":"垂线的性质：过一点有几条直线与已知直线垂直？","o":["0条","1条","2条","无数条"],"a":1,"h":"过一点有且只有一条直线与已知直线垂直","d":"easy"},
          {"id":"c2s1q9","q":"点到直线的距离是指？","o":["点到直线的长度","点到直线的垂线段长度","点到直线的任意线段长度","点到直线的最短距离"],"a":1,"h":"点到直线的距离是垂线段的长度","d":"med"},
          {"id":"c2s1q10","q":"直线l外一点P到l的距离是5cm，则点P到l上任意点Q的距离范围是？","o":["等于5cm","大于5cm","大于或等于5cm","小于或等于5cm"],"a":2,"h":"垂线段最短，其他线段长度≥5cm","d":"hard"}
        ]
      },
      {
        "name": "平行线",
        "qs": [
          {"id":"c2s2q1","q":"平行线的定义是？","o":["不相交的两条直线","在同一平面内不相交的两条直线","垂直的两条直线","相交的两条直线"],"a":1,"h":"平行线是在同一平面内不相交的两条直线","d":"easy"},
          {"id":"c2s2q2","q":"平行公理是？","o":["过一点有且只有一条直线与已知直线平行","过直线外一点有且只有一条直线与已知直线平行","两条直线平行，同位角相等","平行于同一直线的两直线平行"],"a":1,"h":"过直线外一点有且只有一条直线与已知直线平行","d":"easy"},
          {"id":"c2s2q3","q":"两直线平行，同位角？","o":["互补","相等","互余","和为180°"],"a":1,"h":"两直线平行，同位角相等","d":"easy"},
          {"id":"c2s2q4","q":"两直线平行，内错角？","o":["互补","相等","互余","和为180°"],"a":1,"h":"两直线平行，内错角相等","d":"easy"},
          {"id":"c2s2q5","q":"两直线平行，同旁内角？","o":["互补","相等","互余","和为90°"],"a":0,"h":"两直线平行，同旁内角互补","d":"easy"},
          {"id":"c2s2q6","q":"若a∥b，b∥c，则？","o":["a与c相交","a∥c","a⊥c","不确定"],"a":1,"h":"平行于同一直线的两直线平行","d":"easy"},
          {"id":"c2s2q7","q":"如图，a∥b，∠1=60°，则∠2=?","o":["60°","120°","30°","150°"],"a":0,"h":"两直线平行，同位角相等","d":"med"},
          {"id":"c2s2q8","q":"如图，a∥b，∠1=70°，则∠2的内错角=?","o":["70°","110°","20°","140°"],"a":0,"h":"两直线平行，内错角相等，等于∠1=70°","d":"med"},
          {"id":"c2s2q9","q":"如图，a∥b，∠1与∠2是同旁内角，∠1=80°，则∠2=?","o":["80°","100°","10°","170°"],"a":1,"h":"两直线平行，同旁内角互补，∠2=180°-80°=100°","d":"med"},
          {"id":"c2s2q10","q":"判断平行的方法：若同位角相等，则两直线？","o":["相交","平行","垂直","不确定"],"a":1,"h":"同位角相等，两直线平行","d":"easy"}
        ]
      }
    ]
  },
  {
    "id": "c3",
    "name": "变量之间的关系",
    "stages": [
      {
        "name": "变量与函数",
        "qs": [
          {"id":"c3s1q1","q":"在y=2x+1中，自变量是？","o":["y","x","2","1"],"a":1,"h":"x是自变量，y是因变量","d":"easy"},
          {"id":"c3s1q2","q":"在s=vt中，若v不变，则自变量是？","o":["s","v","t","vt"],"a":2,"h":"v不变时，t是自变量，s是因变量","d":"easy"},
          {"id":"c3s1q3","q":"函数y=3x-2，当x=2时，y=?","o":["4","5","6","8"],"a":0,"h":"y=3×2-2=6-2=4","d":"easy"},
          {"id":"c3s1q4","q":"函数y=x²，当x=3时，y=?","o":["6","9","3","12"],"a":1,"h":"y=3²=9","d":"easy"},
          {"id":"c3s1q5","q":"下列哪个不是函数关系？","o":["y=2x","y=x²","x²+y²=1","y=√x"],"a":2,"h":"x²+y²=1中，一个x可能对应两个y，不是函数","d":"med"},
          {"id":"c3s1q6","q":"函数y=1/x的自变量取值范围是？","o":["x≠0","x>0","x<0","任意实数"],"a":0,"h":"分母不能为0，所以x≠0","d":"easy"},

// 等级称号
var TITLES = [
  {lv:1,t:"数学新手"},{lv:2,t:"计算学徒"},{lv:3,t:"运算能手"},{lv:4,t:"解题高手"},
  {lv:5,t:"数学达人"},{lv:6,t:"思维大师"},{lv:7,t:"数学天才"},{lv:8,t:"传奇数学家"}
];

// 游戏状态
var state = {
  coins: 0,
  xp: 0,
  streak: 0,
  currentChapter: null,
  currentStage: null,
  currentQ: 0,
  questions: [],
  correct: 0,
  wrong: 0,
  stars: 0
};

// 自适应题库压缩相关
var ARCHIVE_KEY = 'mathAdv_archived';
var PROGRESS_KEY = 'mathAdv_progress';
var ARCHIVE_DATA_KEY = 'mathAdv_archiveData';

// 获取已归档题目ID列表
function getArchived() {
  var data = localStorage.getItem(ARCHIVE_KEY);
  return data ? JSON.parse(data) : [];
}

// 保存归档列表
function saveArchived(list) {
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(list));
}

// 获取题目进度
function getProgress() {
  var data = localStorage.getItem(PROGRESS_KEY);
  return data ? JSON.parse(data) : {};
}

// 保存进度
function saveProgress(prog) {
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(prog));
}

// 获取归档数据
function getArchiveData() {
  var data = localStorage.getItem(ARCHIVE_DATA_KEY);
  return data ? JSON.parse(data) : {};
}

// 保存归档数据
function saveArchiveData(data) {
  localStorage.setItem(ARCHIVE_DATA_KEY, JSON.stringify(data));
}

// 检查题目是否已归档
function isArchived(qId) {
  return getArchived().indexOf(qId) >= 0;
}

// 归档题目
function archiveQuestion(q) {
  var archived = getArchived();
  if (archived.indexOf(q.id) < 0) {
    archived.push(q.id);
    saveArchived(archived);
    
    var archiveData = getArchiveData();
    archiveData[q.id] = q;
    saveArchiveData(archiveData);
  }
}

// 更新题目进度（答对返回true表示达到归档条件）
function updateProgress(qId, correct) {
  var prog = getProgress();
  if (!prog[qId]) {
    prog[qId] = { correct: 0, lastAttempt: null };
  }
  
  if (correct) {
    prog[qId].correct++;
  } else {
    prog[qId].correct = 0; // 答错重置
  }
  prog[qId].lastAttempt = new Date().toISOString().split('T')[0];
  saveProgress(prog);
  
  return prog[qId].correct >= 3;
}

// 获取活跃题目（排除已归档）
function getActiveQuestions(questions) {
  var archived = getArchived();
  return questions.filter(function(q) {
    return archived.indexOf(q.id) < 0;
  });
}

// 统计活跃和归档题目数
function countQuestions() {
  var total = 0;
  CHS.forEach(function(ch) {
    ch.stages.forEach(function(st) {
      total += st.qs.length;
    });
  });
  var archived = getArchived().length;
  return { active: total - archived, archived: archived, total: total };
}

// 加载状态
function loadState() {
  var saved = localStorage.getItem('mathAdv_state');
  if (saved) {
    var parsed = JSON.parse(saved);
    state.coins = parsed.coins || 0;
    state.xp = parsed.xp || 0;
    state.streak = parsed.streak || 0;
  }
  updateDisplay();
  updateArchiveInfo();
}

// 保存状态
function saveState() {
  localStorage.setItem('mathAdv_state', JSON.stringify({
    coins: state.coins,
    xp: state.xp,
    streak: state.streak
  }));
}

// 更新显示
function updateDisplay() {
  var lv = Math.floor(state.xp / 100) + 1;
  var title = TITLES[0].t;
  for (var i = TITLES.length - 1; i >= 0; i--) {
    if (lv >= TITLES[i].lv) {
      title = TITLES[i].t;
      break;
    }
  }
  document.getElementById('lvDisplay').textContent = 'Lv.' + lv;
  document.getElementById('titleDisplay').textContent = title;
  document.getElementById('coinDisplay').textContent = state.coins;
  document.getElementById('streakDisplay').textContent = state.streak;
}

// 更新归档信息
function updateArchiveInfo() {
  var counts = countQuestions();
  document.getElementById('activeCount').textContent = counts.active;
  document.getElementById('archivedCount').textContent = counts.archived;
}

// 显示屏幕
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) {
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
  
  if (id === 'homeScreen') {
    renderChapters();
    updateArchiveInfo();
  }
}

// 渲染章节列表
function renderChapters() {
  var html = '';
  CHS.forEach(function(ch, idx) {
    var isDone = checkChapterDone(ch.id);
    var isCurrent = idx === 0 || checkChapterDone(CHS[idx-1].id);
    var tag = '';
    var cls = 'chapter';
    
    if (isDone) {
      tag = '<span class="chapter-tag tag-done">✓ 已完成</span>';
      cls += ' done';
    } else if (isCurrent) {
      tag = '<span class="chapter-tag tag-current">进行中</span>';
      cls += ' current';
    } else {
      tag = '<span class="chapter-tag tag-locked">🔒 未解锁</span>';
      cls += ' locked';
    }
    
    // 统计章节活跃题目
    var chTotal = 0;
    ch.stages.forEach(function(st) { chTotal += st.qs.length; });
    var chActive = getActiveQuestions(ch.stages.flatMap(function(st) { return st.qs; })).length;
    
    html += '<div class="' + cls + '" onclick="selectChapter(' + idx + ')">' +
      '<div class="chapter-title">' + ch.name + '</div>' +
      '<div class="chapter-desc">包含 ' + ch.stages.length + ' 个关卡</div>' +
      '<div class="chapter-stats">活跃题目: ' + chActive + ' / ' + chTotal + '</div>' +
      tag + '</div>';
  });
  document.getElementById('chapterList').innerHTML = html;
}

// 检查章节是否完成
function checkChapterDone(chId) {
  var ch = CHS.find(function(c) { return c.id === chId; });
  if (!ch) return false;
  
  var key = 'mathAdv_' + chId;
  var data = localStorage.getItem(key);
  if (!data) return false;
  
  var progress = JSON.parse(data);
  return ch.stages.every(function(st) {
    return progress[st.name] && progress[st.name] >= 3;
  });
}

// 选择章节
function selectChapter(idx) {
  if (idx > 0 && !checkChapterDone(CHS[idx-1].id)) {
    return; // 未解锁
  }
  
  state.currentChapter = idx;
  renderStages();
  showScreen('stageScreen');
}

// 渲染关卡列表
function renderStages() {
  var ch = CHS[state.currentChapter];
  document.getElementById('chapterTitle').textContent = ch.name;
  
  var key = 'mathAdv_' + ch.id;
  var data = localStorage.getItem(key);
  var progress = data ? JSON.parse(data) : {};
  
  var html = '';
  ch.stages.forEach(function(st, idx) {
    var stars = progress[st.name] || 0;
    var starStr = '☆☆☆'.split('');
    for (var i = 0; i < stars; i++) {
      starStr[i] = '★';
    }
    
    // 统计关卡活跃题目
    var stActive = getActiveQuestions(st.qs).length;
    
    html += '<div class="stage" onclick="startStage(' + idx + ')">' +
      '<div class="stage-name">' + st.name + ' <small style="color:#999">(' + stActive + '题)</small></div>' +
      '<div class="stage-stars">' + starStr.join('') + '</div></div>';
  });
  document.getElementById('stageList').innerHTML = html;
}

// 开始关卡
function startStage(idx) {
  var ch = CHS[state.currentChapter];
  var stage = ch.stages[idx];
  
  state.currentStage = idx;
  state.questions = getActiveQuestions(stage.qs.slice()); // 只用活跃题目
  
  if (state.questions.length === 0) {
    alert('该关卡所有题目已掌握！点击"复习模式"可以重新练习。');
    return;
  }
  
  // 打乱顺序
  state.questions.sort(function() { return Math.random() - 0.5; });
  
  state.currentQ = 0;
  state.correct = 0;
  state.wrong = 0;
  state.stars = 0;
  
  showScreen('quizScreen');
  showQuestion();
}

// 显示题目
function showQuestion() {
  var q = state.questions[state.currentQ];
  
  document.getElementById('currentQ').textContent = state.currentQ + 1;
  document.getElementById('totalQ').textContent = state.questions.length;
  document.getElementById('progressFill').style.width = 
    ((state.currentQ + 1) / state.questions.length * 100) + '%';
  
  var diffClass = q.d === 'easy' ? 'diff-easy' : (q.d === 'med' ? 'diff-med' : 'diff-hard');
  var diffText = q.d === 'easy' ? '简单' : (q.d === 'med' ? '中等' : '困难');
  
  document.getElementById('questionText').innerHTML = 
    q.q + '<span class="difficulty ' + diffClass + '">' + diffText + '</span>';
  
  var optHtml = '';
  q.o.forEach(function(o, i) {
    optHtml += '<div class="option" onclick="selectOption(' + i + ')">' + 
      String.fromCharCode(65 + i) + '. ' + o + '</div>';
  });
  document.getElementById('optionsBox').innerHTML = optHtml;
  document.getElementById('hintBox').classList.remove('show');
  document.getElementById('nextBtn').style.display = 'none';
}

// 选择选项
function selectOption(idx) {
  var q = state.questions[state.currentQ];
  var options = document.querySelectorAll('.option');
  
  options.forEach(function(opt) {
    opt.classList.add('disabled');
  });
  
  if (idx === q.a) {
    options[idx].classList.add('correct');
    state.correct++;
    state.stars++;
    state.streak++;
    
    // 更新进度并检查是否需要归档
    var shouldArchive = updateProgress(q.id, true);
    
    setTimeout(function() {
      if (shouldArchive) {
        archiveQuestion(q);
        // 从当前题目列表移除
        state.questions = state.questions.filter(function(item) {
          return item.id !== q.id;
        });
      }
      goNext();
    }, 800);
  } else {
    options[idx].classList.add('wrong');
    options[q.a].classList.add('correct');
    state.wrong++;
    state.streak = 0;
    
    // 答错重置进度
    updateProgress(q.id, false);
    
    document.getElementById('hintBox').textContent = '💡 ' + q.h;
    document.getElementById('hintBox').classList.add('show');
    document.getElementById('nextBtn').style.display = 'inline-block';
  }
}

// 继续下一题
function goNext() {
  state.currentQ++;
  
  if (state.currentQ >= state.questions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

// 显示结果
function showResult() {
  var ch = CHS[state.currentChapter];
  var stage = ch.stages[state.currentStage];
  
  // 保存关卡进度
  var key = 'mathAdv_' + ch.id;
  var data = localStorage.getItem(key);
  var progress = data ? JSON.parse(data) : {};
  
  var oldStars = progress[stage.name] || 0;
  var newStars = Math.min(3, state.stars);
  progress[stage.name] = Math.max(oldStars, newStars);
  localStorage.setItem(key, JSON.stringify(progress));
  
  // 计算奖励
  var coins = state.correct * 5 + state.stars * 2;
  state.coins += coins;
  state.xp += state.correct * 10;
  saveState();
  
  // 显示结果
  var isWin = state.correct >= Math.ceil(state.questions.length * 0.6);
  
  document.getElementById('resultIcon').textContent = isWin ? '🎉' : '💪';
  document.getElementById('resultTitle').textContent = isWin ? '闯关成功！' : '继续加油！';
  document.getElementById('correctNum').textContent = state.correct;
  document.getElementById('wrongNum').textContent = state.wrong;
  document.getElementById('starNum').textContent = state.stars;
  
  if (coins > 0) {
    document.getElementById('rewardBox').style.display = 'block';
    document.getElementById('rewardCoins').textContent = coins;
  } else {
    document.getElementById('rewardBox').style.display = 'none';
  }
  
  // 显示归档通知
  var archivedCount = getArchived().length;
  if (archivedCount > 0) {
    document.getElementById('archiveNotice').style.display = 'block';
    document.getElementById('archiveNotice').textContent = 
      '📚 已掌握 ' + archivedCount + ' 道题目，自动归档中...';
  } else {
    document.getElementById('archiveNotice').style.display = 'none';
  }
  
  // 下一关按钮
  if (isWin && state.currentStage < ch.stages.length - 1) {
    document.getElementById('nextStageBtn').style.display = 'inline-block';
  } else {
    document.getElementById('nextStageBtn').style.display = 'none';
  }
  
  showScreen('resultScreen');
  updateDisplay();
  updateArchiveInfo();
}

// 重试关卡
function retryStage() {
  startStage(state.currentStage);
}

// 下一关
function nextStage() {
  startStage(state.currentStage + 1);
}

// 显示归档屏幕
function showArchiveScreen() {
  var archived = getArchived();
  var archiveData = getArchiveData();
  
  var html = '<p style="text-align:center;color:#999;margin-bottom:15px">连续答对3次的题目已自动归档</p>';
  
  if (archived.length === 0) {
    html += '<p style="text-align:center;color:#666">暂无已掌握的题目</p>';
  } else {
    html += '<div style="display:grid;gap:10px">';
    archived.forEach(function(qId) {
      var q = archiveData[qId];
      if (q) {
        html += '<div style="background:#f8f9fa;border-radius:10px;padding:12px">' +
          '<div style="font-weight:bold;margin-bottom:5px">' + q.q + '</div>' +
          '<div style="font-size:12px;color:#666">答案: ' + String.fromCharCode(65 + q.a) + '. ' + q.o[q.a] + '</div>' +
          '<button class="btn secondary" style="margin-top:8px;padding:5px 12px;font-size:12px" onclick="restoreQuestion(\'' + qId + '\')">恢复此题</button>' +
          '</div>';
      }
    });
    html += '</div>';
  }
  
  document.getElementById('archiveList').innerHTML = html;
  showScreen('archiveScreen');
}

// 恢复单个题目
function restoreQuestion(qId) {
  var archived = getArchived();
  archived = archived.filter(function(id) { return id !== qId; });
  saveArchived(archived);
  
  // 重置进度
  var prog = getProgress();
  if (prog[qId]) {
    prog[qId].correct = 0;
    saveProgress(prog);
  }
  
  updateArchiveInfo();
  showArchiveScreen();
}

// 恢复所有归档题目
function restoreAllArchived() {
  if (!confirm('确定要恢复所有已掌握的题目吗？')) return;
  
  saveArchived([]);
  
  var prog = getProgress();
  Object.keys(prog).forEach(function(qId) {
    prog[qId].correct = 0;
  });
  saveProgress(prog);
  
  updateArchiveInfo();
  alert('已恢复所有题目！');
  showScreen('homeScreen');
}

// 复习模式（随机抽取10道归档题目）
function reviewArchived() {
  var archived = getArchived();
  var archiveData = getArchiveData();
  
  if (archived.length === 0) {
    alert('暂无已掌握的题目可供复习！');
    return;
  }
  
  // 随机抽取最多10题
  var reviewQuestions = [];
  var shuffled = archived.slice().sort(function() { return Math.random() - 0.5; });
  for (var i = 0; i < Math.min(10, shuffled.length); i++) {
    var q = archiveData[shuffled[i]];
    if (q) {
      reviewQuestions.push(q);
    }
  }
  
  if (reviewQuestions.length === 0) {
    alert('无法加载复习题目！');
    return;
  }
  
  state.questions = reviewQuestions;
  state.currentQ = 0;
  state.correct = 0;
  state.wrong = 0;
  state.stars = 0;
  state.currentChapter = null;
  state.currentStage = null;
  
  showScreen('quizScreen');
  showQuestion();
}

// 初始化
loadState();
renderChapters();
</script>
