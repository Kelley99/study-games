<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>地理大闯关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#2193b0 0%,#6dd5ed 100%);min-height:100vh;color:#333}
.container{max-width:800px;margin:0 auto;padding:20px}
.header{text-align:center;color:#fff;margin-bottom:20px}
.header h1{font-size:28px;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,0.3)}
.stats{display:flex;justify-content:center;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.stat-box{background:rgba(255,255,255,0.95);padding:15px 25px;border-radius:15px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,0.2);min-width:100px}
.stat-box .value{font-size:24px;font-weight:bold;color:#2193b0}
.stat-box .label{font-size:12px;color:#666;margin-top:5px}
.screen{display:none;background:rgba(255,255,255,0.98);border-radius:20px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.screen.active{display:block}
.btn{background:linear-gradient(135deg,#2193b0 0%,#6dd5ed 100%);color:#fff;border:none;padding:12px 25px;border-radius:25px;cursor:pointer;font-size:16px;transition:transform 0.2s,box-shadow 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(33,147,176,0.4)}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.chapter-list{display:grid;gap:15px}
.chapter{background:#f8f9fa;border-radius:15px;padding:20px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;border:2px solid transparent}
.chapter:hover{transform:translateY(-3px);box-shadow:0 5px 20px rgba(0,0,0,0.1)}
.chapter.current{border-color:#2193b0;background:#e8f8ff}
.chapter.locked{opacity:0.6;cursor:not-allowed}
.chapter.done{border-color:#28a745;background:#f0fff4}
.chapter-title{font-size:18px;font-weight:bold;color:#333;margin-bottom:8px}
.chapter-desc{font-size:14px;color:#666}
.chapter-tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;margin-top:10px}
.tag-current{background:#2193b0;color:#fff}
.tag-locked{background:#6c757d;color:#fff}
.tag-done{background:#28a745;color:#fff}
.stage-list{display:grid;gap:12px;margin-top:20px}
.stage{background:#f8f9fa;border-radius:12px;padding:15px;cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center}
.stage:hover{background:#e9ecef}
.stage-name{font-weight:bold;color:#333}
.stage-stars{color:#ffc107;font-size:18px}
.quiz-container{text-align:center}
.progress{margin-bottom:20px}
.progress-bar{height:8px;background:#e9ecef;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2193b0,#6dd5ed);transition:width 0.3s}
.progress-text{font-size:14px;color:#666;margin-top:8px}
.question{font-size:20px;font-weight:bold;color:#333;margin-bottom:25px;line-height:1.6}
.options{display:grid;gap:12px;max-width:500px;margin:0 auto}
.option{background:#f8f9fa;border:2px solid #e9ecef;border-radius:12px;padding:15px;cursor:pointer;transition:all 0.2s;text-align:left}
.option:hover{border-color:#2193b0;background:#e8f8ff}
.option.correct{border-color:#28a745;background:#d4edda}
.option.wrong{border-color:#dc3545;background:#f8d7da}
.option.disabled{pointer-events:none;opacity:0.7}
.hint{background:#d1ecf1;border:1px solid #bee5eb;border-radius:10px;padding:15px;margin-top:20px;color:#0c5460;display:none}
.hint.show{display:block}
.result{text-align:center;padding:40px 20px}
.result-icon{font-size:80px;margin-bottom:20px}
.result-title{font-size:28px;font-weight:bold;color:#333;margin-bottom:15px}
.result-stats{display:flex;justify-content:center;gap:30px;margin:25px 0}
.result-stat{text-align:center}
.result-stat .num{font-size:36px;font-weight:bold;color:#2193b0}
.result-stat .txt{font-size:14px;color:#666}
.reward{background:linear-gradient(135deg,#6dd5ed 0%,#2193b0 100%);color:#fff;padding:20px;border-radius:15px;margin:20px 0;font-size:18px;font-weight:bold}
.btn-group{display:flex;gap:15px;justify-content:center;margin-top:25px;flex-wrap:wrap}
.difficulty{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;margin-left:10px}
.diff-easy{background:#d4edda;color:#155724}
.diff-med{background:#fff3cd;color:#856404}
.diff-hard{background:#f8d7da;color:#721c24}
.unlock-hint{text-align:center;color:#fff;font-size:14px;margin-top:10px;opacity:0.9}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>地理大闯关</h1>
    <p>七年级下册 · 认识世界</p>
  </div>
  <div class="stats">

    <div class="stat-box"><div class="value" id="streakDisplay">0</div><div class="label">连胜</div></div>

  <div id="stageScreen" class="screen"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2 id="chapterTitle">章节</h2><button class="btn" onclick="showScreen('homeScreen')">返回</button></div><div id="stageList" class="stage-list"></div></div>
  <div id="quizScreen" class="screen"><div class="quiz-container"><div class="progress"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div class="progress-text">题目 <span id="currentQ">1</span> / <span id="totalQ">10</span></div></div><div id="questionBox"><div class="question" id="questionText"></div><div class="options" id="optionsBox"></div><div class="hint" id="hintBox"></div></div></div></div>

</div>
<script>

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}

function showQuestion(){var q=currentQuestions[currentQIndex];document.getElementById('currentQ').textContent=currentQIndex+1;document.getElementById('totalQ').textContent=currentQuestions.length;document.getElementById('progressFill').style.width=((currentQIndex/currentQuestions.length)*100)+'%';var diffClass='diff-'+q.d;var diffText=q.d==='easy'?'基础':q.d==='med'?'中等':'困难';document.getElementById('questionText').innerHTML=q.q+'<span class="difficulty '+diffClass+'">'+diffText+'</span>';var html='';for(var i=0;i<q.o.length;i++){html+='<div class="option" onclick="selectOption('+i+')" data-idx="'+i+'">'+String.fromCharCode(65+i)+'. '+q.o[i]+'</div>'}document.getElementById('optionsBox').innerHTML=html;document.getElementById('hintBox').classList.remove('show');document.getElementById('hintBox').textContent='💡 '+q.h}
function selectOption(idx){var q=currentQuestions[currentQIndex];var opts=document.querySelectorAll('.option');for(var i=0;i<opts.length;i++){opts[i].classList.add('disabled');if(parseInt(opts[i].dataset.idx)===q.a)opts[i].classList.add('correct')}if(idx===q.a){correctCount++}else{wrongCount++;for(var i=0;i<opts.length;i++){if(parseInt(opts[i].dataset.idx)===idx)opts[i].classList.add('wrong')}document.getElementById('hintBox').classList.add('show')}setTimeout(function(){currentQIndex++;if(currentQIndex<currentQuestions.length)showQuestion();else showResult()},1500)}
function showResult(){var total=currentQuestions.length;var accuracy=correctCount/total;var stars=accuracy>=0.9?3:accuracy>=0.7?2:accuracy>=0.5?1:0;var prevStars=S.stars[currentStage.name]||0;if(stars>prevStars)S.stars[currentStage.name]=stars;var baseCoins=correctCount*10+stars*20;S.coins+=baseCoins;S.xp+=correctCount*10+stars*20;while(S.xp>=S.lv*100){S.xp-=S.lv*100;S.lv++}var newUnlock=false;var unlockText='';if(currentChapterIdx===0&&!S.c2unlocked&&isChapterUnlocked(1)){newUnlock=true;unlockText='🔓 恭喜！「我们邻近的国家和地区」已解锁！'}else if(currentChapterIdx===1&&!S.c3unlocked&&isChapterUnlocked(2)){newUnlock=true;unlockText='🔓 恭喜！「东半球其他的国家和地区」已解锁！'}saveS();updateStats();document.getElementById('resultIcon').textContent=stars===3?'🏆':stars===2?'🥈':stars===1?'🥉':'💪';document.getElementById('resultTitle').textContent=stars===3?'完美通关！':stars===2?'优秀！':stars===1?'及格！':'继续加油！';document.getElementById('correctNum').textContent=correctCount;document.getElementById('wrongNum').textContent=wrongCount;document.getElementById('starNum').textContent=stars;if(baseCoins>0){document.getElementById('rewardBox').style.display='block';document.getElementById('rewardCoins').textContent=baseCoins}else{document.getElementById('rewardBox').style.display='none'}if(newUnlock){document.getElementById('unlockBox').style.display='block';document.getElementById('unlockBox').textContent=unlockText}else{document.getElementById('unlockBox').style.display='none'}var stageIdx=currentChapter.stages.indexOf(currentStage);document.getElementById('nextStageBtn').style.display=stageIdx<currentChapter.stages.length-1?'inline-block':'none';showScreen('resultScreen')}
function retryStage(){startStage(currentStageIdx)}
function nextStage(){var idx=currentStageIdx;if(idx<currentChapter.stages.length-1)startStage(idx+1)}
updateStats();renderHome();
</script>
