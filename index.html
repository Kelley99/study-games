<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>📚 学习大闯关</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      width: 100%;
    }
    h1 {
      color: white;
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .subtitle {
      color: rgba(255,255,255,0.9);
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 40px;
    }
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .game-card {
      background: white;
      border-radius: 16px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .game-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    .game-card:active {
      transform: translateY(-2px);
    }
    .game-icon {
      font-size: 4rem;
      margin-bottom: 15px;
    }
    .game-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .game-desc {
      font-size: 0.9rem;
      color: #666;
      line-height: 1.4;
    }
    .game-stats {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-size: 0.85rem;
      color: #888;
    }
    .history-card { border-top: 4px solid #e74c3c; }
    .history-card .game-icon { color: #e74c3c; }
    .bio-card { border-top: 4px solid #27ae60; }
    .bio-card .game-icon { color: #27ae60; }
    .geo-card { border-top: 4px solid #3498db; }
    .geo-card .game-icon { color: #3498db; }
    .eng-card { border-top: 4px solid #6C5CE7; }
    .eng-card .game-icon { color: #6C5CE7; }
    .footer {
      color: rgba(255,255,255,0.7);
      text-align: center;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 学习大闯关</h1>
    <p class="subtitle">选择科目，开启你的知识冒险之旅！</p>

    <div class="games">
      <div class="game-card history-card" onclick="location.href='./history-adventure/'">
        <div class="game-icon">📜</div>
        <div class="game-title">历史大冒险</div>
        <div class="game-desc">隋唐到宋元，穿越千年历史长河</div>
        <div class="game-stats">8关 · 192题</div>
      </div>

      <div class="game-card bio-card" onclick="location.href='./biology-adventure/'">
        <div class="game-icon">🧬</div>
        <div class="game-title">生物大闯关</div>
        <div class="game-desc">探索人体奥秘，从营养到代谢</div>
        <div class="game-stats">4关 · 96题</div>
      </div>

      <div class="game-card geo-card" onclick="location.href='./geography-adventure/'">
        <div class="game-icon">🌍</div>
        <div class="game-title">地理大闯关</div>
        <div class="game-desc">环球之旅，从亚洲到南极洲</div>
        <div class="game-stats">6关 · 144题</div>
      </div>

      <div class="game-card eng-card" onclick="location.href='./english-adventure/'">
        <div class="game-icon">✨</div>
        <div class="game-title">英语大冒险</div>
        <div class="game-desc">七下全册8单元，词形/短语/句型</div>
        <div class="game-stats">8关 · 96题</div>
      </div>
    </div>

    <p class="footer">💡 进度会自动保存在你的浏览器中</p>
  </div>
</body>
</html>
